lingo:
    spec: 'exe'
    version: '0.1.0b'

meta:
    description: 'Hello world for importing functions and models for validation'

import:
    - 'hello-library.yaml'

main:
    call: 'hello_ns.say_hello'
    args:
        name:
            get:
                field: 'name'
                from:
                    validate:
                        item:
                            get:
                                field: 'sample_person'
                                from: 'hello_ns'
                        against: 'hello_ns.person'
