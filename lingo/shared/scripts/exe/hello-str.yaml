lingo:
    spec: 'exe'
    version: '0.1.0b'

meta:
    description: 'Hello world for strings, casting various types to str and concatenating them together.'

main:
    concat:
        - 'lingo str testing'
        - type: str
          value: ' :: bools '
        - str: true
        - ', '
        - str:
            type: bool
            value: false
        - ' :: ints '
        - str:
            type: int
            value: 42
        - ', '
        - str: 24
        - ' :: floats '
        - str:
            type: float
            value: 3.14
        - ', '
        - str: 2.718
