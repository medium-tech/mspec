                        description: "ID of the file being backed up"
                result:
                    type: struct
                    fields:
                        acknowledged:
                            name:
                                lower_case: "acknowledged"
                            type: bool
                            description: "Whether the file replication was successful"
                        message:
                            name:
                                lower_case: "message"
                            type: str
                            description: "Acknowledgement message for starting the file replication"

            verify_replication:
                name:
                    lower_case: "verify replication"
                description: "Call verify_file_copy for each file copy of the file to verify the replications"
                func:
                    call: "file_system.verify_replication"
                    args:
                        file_id:
