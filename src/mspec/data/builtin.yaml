lingo:
    version: "builtin-beta-1"

modules:
    auth:
        name:
            lower_case: "auth"

        ops:

            create_user:
                name:
                    lower_case: "create user"
                description: "Create a new user with name and email"
                func:
                    call: "auth.create_user"
                    args:
                        name:
                            params: {name: {}}
                        email:
                            params: {email: {}}
                        password:
                            params: {password: {}}
                        password_confirm:
                            params: {password_confirm: {}}
                params:
                    name:
                        name:
                            lower_case: "name"
                        type: str
                        description: "Name of the user"
                    email:
                        name:
                            lower_case: "email"
                        type: str
                        description: "Email of the user"
                    password:
                        name:
                            lower_case: "password"
                        type: str
                        secure_input: true
                        description: "Password for the user"
                    password_confirm:
                        name:
                            lower_case: "password confirm"
                        type: str
                        secure_input: true
                        description: "Password confirmation"
                result:
                    type: struct
                    fields:
                        id:
                            name:
                                lower_case: "id"
                            type: str
                            description: "ID of the created user"
                        name:
                            name:
                                lower_case: "name"
                            type: str
                            description: "Name of the created user"
                        email:
                            name:
                                lower_case: "email"
                            type: str
                            description: "Email of the created user"

            login_user:
                name:
                    lower_case: "login user"
                description: "Login a user with email and password"
                func:
                    call: "auth.login_user"
                    args:
                        email:
                            params: {email: {}}
                        password:
                            params: {password: {}}
                params:
                    email:
                        name:
                            lower_case: "email"
                        type: str
                        description: "Email of the user"
                    password:
                        name:
                            lower_case: "password"
                        type: str
                        description: "Password for the user"
                        secure_input: true
                result:
                    type: struct
                    fields:
                        access_token:
                            name:
                                lower_case: "access token"
                            type: str
                            secure: true
                            description: "Access token for the logged in user"
                        token_type:
                            name:
                                lower_case: "token type"
                            type: str
                            description: "Type of the token"

            current_user:
                name:
                    lower_case: "current user"
                description: "Get the current logged in user"
                func:
                    call: "auth.current_user"
                    args: {}
                params: {}
                result:
                    type: struct
                    fields:
                        id:
                            name:
                                lower_case: "id"
                            type: str
                            description: "ID of the current user"
                        name:
                            name:
                                lower_case: "name"
                            type: str
                            description: "Name of the current user"
                        email:
                            name:
                                lower_case: "email"
                            type: str
                            description: "Email of the current user"
                        number_of_sessions:
                            name:
                                lower_case: "number of sessions"
                            type: int
                            description: "Number of active sessions for the current user"

            logout_user:
                name:
                    lower_case: "logout user"
                description: "Logout the current user"
                func:
                    call: "auth.logout_user"
                    args:
                        mode:
                            params: {mode: {}}
                params:
                    mode:
                        name:
                            lower_case: "mode"
                        type: str
                        enum:
                            - "all"
                            - "current"
                            - "others"
                        description: "Logout mode, use all to logout from all sessions, current to logout from current session, others to logout all sessions except this one"
                result:
                    type: struct
                    fields:
                        acknowledged:
                            name:
                                lower_case: "acknowledged"
                            type: bool
                            description: "Whether the logout was successful"
                        message:
                            name:
                                lower_case: "message"
                            type: str
                            description: "Acknowledgement message"

            delete_user:
                name:
                    lower_case: "delete user"
                description: "Delete currently logged in user"
                func:
                    call: "auth.delete_user"
                    args: {}
                params: {}
                result:
                    type: struct
                    fields:
                        acknowledged:
                            name:
                                lower_case: "acknowledged"
                            type: bool
                            description: "Whether the deletion was successful"
                        message:
                            name:
                                lower_case: "message"
                            type: str
                            description: "Acknowledgement message"

            drop_sessions:
                name:
                    lower_case: "drop sessions"
                description: "Drop all sessions"
                func:
                    call: "auth.drop_sessions"
                    args:
                        root_password:
                            params: {root_password: {}}
                params:
                    root_password:
                        name:
                            lower_case: "root password"
                        type: str
                        secure_input: true
                        description: "Root password to authorize dropping all sessions"
                result:
                    type: struct
                    fields:
                        acknowledged:
                            name:
                                lower_case: "acknowledged"
                            type: bool
                            description: "Always true, indicates the operation was successful"
                        message:
                            name:
                                lower_case: "message"
                            type: str
                            description: "Acknowledgement message"

        models:

            user:
                hidden: true
                name:
                    lower_case: "user"

                fields:
                    name:
                        name:
                            lower_case: "name"
                        type: str
                        examples:
                            - "alice"
                            - "bob"

                    email:
                        name:
                            lower_case: "email"
                        type: str
                        examples:
                            - "alice@example.com"
                            - "bob@example.com"

            user_session:
                hidden: true
                name:
                    lower_case: "user session"

                fields:
                    user_id:
                        name:
                            lower_case: "user id"
                        type: foreign_key
                        references:
                            table: "user"
                            field: "id"
                        examples:
                            - "1"
                            - "2"

                    session_token:
                        name:
                            lower_case: "session token"
                        type: str
                        examples:
                            - "token_abc123"
                            - "token_def456"

                    created_at:
                        name:
                            lower_case: "created at"
                        type: datetime
                        examples:
                            - "2023-01-01T12:00:00Z"
                            - "2023-01-02T15:30:00Z"

            password_hash:
                hidden: true
                name:
                    lower_case: "password hash"

                fields:
                    hash:
                        name:
                            lower_case: "hash"
                        type: str
                        examples:
                            - "hashed_password_1"
                            - "hashed_password_2"

                    user_id:
                        name:
                            lower_case: "user id"
                        type: foreign_key
                        references:
                            table: "user"
                            field: "id"
                        examples:
                            - "1"
                            - "2"

    files:
        name:
            lower_case: "files"
        
        models:

            file:
                hidden: true
                name:
                    lower_case: "file"

                auth:
                    require_login: true

                fields:
                    name:
                        name:
                            lower_case: "name"
                        type: str
                        examples:
                            - "document.txt"
                            - "image.png"

                    status:
                        name:
                            lower_case: "status"
                        type: str
                        enum:
                            - "uploading"
                            - "completed"
                            - "failed"
                        examples:
                            - "uploading"
                            - "completed"
                            - "failed"
                    message:
                        name:
                            lower_case: "message"
                        type: str
                        examples:
                            - "File is being uploaded"
                            - "File upload completed successfully"
                            - "File upload failed due to network error"

                    extension:
                        name:
                            lower_case: "extension"
                        type: str
                        examples:
                            - "txt"
                            - "png"

                    size:
                        name:
                            lower_case: "size"
                        type: int
                        examples:
                            - 1024
                            - 2048

                    parts:
                        name:
                            lower_case: "parts"
                        type: int
                        examples:
                            - 1
                            - 2
                    
                    content_type:
                        name:
                            lower_case: "content type"
                        type: str
                        examples:
                            - "text/plain"
                            - "image/png"

                    user_id:
                        name:
                            lower_case: "user id"
                        type: foreign_key
                        references:
                            table: "user"
                            field: "id"
                        examples:
                            - "1"
                            - "2"

                    created_at:
                        name:
                            lower_case: "created at"
                        type: datetime
                        examples:
                            - "2000-01-11T12:34:56"
                            - "2020-10-02T15:30:00"

                    updated_at:
                        name:
                            lower_case: "updated at"
                        type: datetime
                        examples:
                            - "2000-01-11T12:34:56"
                            - "2020-10-02T15:30:00"
            
            file_part:
                hidden: true
                name:
                    lower_case: "file part"

                auth:
                    require_login: true

                fields:
                    file_id:
                        name:
                            lower_case: "file id"
                        type: foreign_key
                        references:
                            table: "file"
                            field: "id"
                        examples:
                            - "1"
                            - "2"

                    part_number:
                        name:
                            lower_case: "part number"
                        type: int
                        examples:
                            - 1
                            - 2

                    sha3_256:
                        name:
                            lower_case: "sha3 256"
                        type: str
                        examples:
                            - "3338be694f50c5f338814986cdf0686453a888b84f424d792af4b9202398f392"
                            - "2cf24dba5fb0a30e26e83b2ac5b9e29e1b161e5c1fa7425e73043362938b9824"

                    user_id:
                        name:
                            lower_case: "user id"
                        type: foreign_key
                        references:
                            table: "user"
                            field: "id"
                        examples:
                            - "1"
                            - "2"

                    uploaded_at:
                        name:
                            lower_case: "uploaded at"
                        type: datetime
                        examples:
                            - "2000-01-11T12:34:56"
                            - "2020-10-02T15:30:00"
        
        ops:

            ingest_start:
                name:
                    lower_case: "ingest start"
                description: "Start ingesting a file with name, size, parts, content type and extension"
                
            ingest_part:
                name:
                    lower_case: "ingest file part"
                description: "Ingest a part of a file with file id, part number and content"
                func:
                    call: "files.ingest_file_part"
                    args:
                        file_id:
                            params: {file_id: {}}
                        part_number:
                            params: {part_number: {}}
                        content:
                            self: {file_input: {}}
                params:
                    file_id:
                        name:
                            lower_case: "file id"
                        type: foreign_key
                        references:
                            table: "file"
                            field: "id"
                        description: "ID of the file being uploaded"
                    part_number:
                        name:
                            lower_case: "part number"
                        type: int
                        description: "Part number of the file being uploaded"
                result:
                    type: struct
                    fields:
                        acknowledged:
                            name:
                                lower_case: "acknowledged"
                            type: bool
                            description: "Whether the file part upload was successful"
                        message:
                            name:
                                lower_case: "message"
                            type: str
                            description: "Acknowledgement message for the file part upload" 

            ingest_finish:
                name:
                    lower_case: "ingest finish"
                description: "Finish ingesting a file with file id"
                func:
                    call: "files.ingest_finish"
                    args:
                        file_id:
                            params: {file_id: {}}
                params:
                    file_id:
                        name:
                            lower_case: "file id"
                        type: foreign_key
                        references:
                            table: "file"
                            field: "id"
                        description: "ID of the file being uploaded"
                result:
                    type: struct
                    fields:
                        acknowledged:
                            name:
                                lower_case: "acknowledged"
                            type: bool
                            description: "Whether the file upload was marked as finished successfully"
                        message:
                            name:
                                lower_case: "message"
                            type: str
                            description: "Acknowledgement message for finishing the file upload"

            verify_file:
                name:
                    lower_case: "verify file"
                description: "Verify a file upload with file id"
                func:
                    call: "files.verify_file"
                    args:
                        file_id:
                            params: {file_id: {}}
                params:
                    file_id:
                        name:
                            lower_case: "file id"
                        type: foreign_key
                        references:
                            table: "file"
                            field: "id"
                        description: "ID of the file being verified"
                result:
                    type: struct
                    fields:
                        verified:
                            name:
                                lower_case: "verified"
                            type: bool
                            description: "Whether the file upload was verified successfully"
                        message:
                            name:
                                lower_case: "message"
                            type: str
                            description: "Acknowledgement message for the file verification"
            
            delete_file:
                name:
                    lower_case: "delete file"
                description: "Delete a file with file id"
