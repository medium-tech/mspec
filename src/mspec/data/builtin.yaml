                result:
                    type: struct
                    fields:
                        acknowledged:
                            name:
                                lower_case: "acknowledged"
                            type: bool
                            description: "Whether the replication verification was started successfully"
                        message:
                            name:
                                lower_case: "message"
                            type: str
                            description: "Acknowledgement message for starting the replication verification"

    media:
        name:
            lower_case: "media"
        description: "Media management for files, such as generating thumbnails and previews, and extracting metadata"
        models:

            image:
                hidden: true
                name:
                    lower_case: "image"
                auth:
                    require_login: true
                fields:

                    file_id:
                        name:
                            lower_case: "file id"
                        type: foreign_key
                        references:
                            module: "file_system"
                            table: "file"
                            field: "id"
                        examples:
                            - "1"
                            - "2"

                    user_id:
                        name:
                            lower_case: "user id"
                        type: foreign_key
