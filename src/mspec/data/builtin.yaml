                    lower_case: "create image"
                description: "Ingest a file and create an image record for it with metadata such as format, dimensions, color space and compression mode. Returns an error if the file is not a valid image."
                
                func:
                    call: "media.create_image"
                    args: 
                        name:
                            params: {name: {}}
                        content_type:
                            params: {content_type: {}}
                
