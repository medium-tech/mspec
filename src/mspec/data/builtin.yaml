lingo:
    version: "builtin-beta-1"

modules:
    auth:
        name:
            lower_case: "auth"

        models:

            user:
                hidden: true
                name:
                    lower_case: "user"

                fields:
                    name:
                        name:
                            lower_case: "name"
                        type: str
                        examples:
                            - "alice"
                            - "bob"

                    email:
                        name:
                            lower_case: "email"
                        type: str
                        examples:
                            - "alice@example.com"
                            - "bob@example.com"

            user_session:
                hidden: true
                name:
                    lower_case: "user session"

                fields:
                    user_id:
                        name:
                            lower_case: "user id"
                        type: foreign_key
                        references:
                            module: "auth"
                            table: "user"
                            field: "id"
                        examples:
                            - "1"
                            - "2"

                    session_token:
                        name:
                            lower_case: "session token"
                        type: str
                        examples:
                            - "token_abc123"
                            - "token_def456"

                    created_at:
                        name:
                            lower_case: "created at"
                        type: datetime
                        examples:
                            - "2023-01-01T12:00:00Z"
                            - "2023-01-02T15:30:00Z"

            password_hash:
                hidden: true
                name:
                    lower_case: "password hash"

                fields:
                    hash:
                        name:
                            lower_case: "hash"
                        type: str
                        examples:
                            - "hashed_password_1"
                            - "hashed_password_2"

                    user_id:
                        name:
                            lower_case: "user id"
                        type: foreign_key
                        references:
                            module: "auth"
                            table: "user"
                            field: "id"
                        examples:
                            - "1"
                            - "2"

        ops:

            create_user:
                name:
                    lower_case: "create user"
                description: "Create a new user with name and email"
                func:
                    call: "auth.create_user"
                    args:
                        name:
                            params: {name: {}}
                        email:
                            params: {email: {}}
                        password:
                            params: {password: {}}
                        password_confirm:
                            params: {password_confirm: {}}
                params:
                    name:
                        name:
                            lower_case: "name"
                        type: str
                        description: "Name of the user"
                    email:
                        name:
                            lower_case: "email"
                        type: str
                        description: "Email of the user"
                    password:
                        name:
                            lower_case: "password"
                        type: str
                        secure_input: true
                        description: "Password for the user"
                    password_confirm:
                        name:
                            lower_case: "password confirm"
                        type: str
                        secure_input: true
                        description: "Password confirmation"
                result:
                    type: struct
                    fields:
                        id:
                            name:
                                lower_case: "id"
                            type: str
                            description: "ID of the created user"
                        name:
                            name:
                                lower_case: "name"
                            type: str
                            description: "Name of the created user"
                        email:
                            name:
                                lower_case: "email"
                            type: str
                            description: "Email of the created user"

            login_user:
                name:
                    lower_case: "login user"
                description: "Login a user with email and password"
                func:
                    call: "auth.login_user"
                    args:
                        email:
                            params: {email: {}}
                        password:
                            params: {password: {}}
                params:
                    email:
                        name:
                            lower_case: "email"
                        type: str
                        description: "Email of the user"
                    password:
                        name:
                            lower_case: "password"
                        type: str
                        description: "Password for the user"
                        secure_input: true
                result:
                    type: struct
                    fields:
                        access_token:
                            name:
                                lower_case: "access token"
                            type: str
                            secure: true
                            description: "Access token for the logged in user"
                        token_type:
                            name:
                                lower_case: "token type"
                            type: str
                            description: "Type of the token"

            current_user:
                name:
                    lower_case: "current user"
                description: "Get the current logged in user"
                func:
                    call: "auth.current_user"
                    args: {}
                params: {}
                result:
                    type: struct
                    fields:
                        id:
                            name:
                                lower_case: "id"
                            type: str
                            description: "ID of the current user"
                        name:
                            name:
                                lower_case: "name"
                            type: str
                            description: "Name of the current user"
                        email:
                            name:
                                lower_case: "email"
                            type: str
                            description: "Email of the current user"
                        number_of_sessions:
                            name:
                                lower_case: "number of sessions"
                            type: int
                            description: "Number of active sessions for the current user"

            logout_user:
                name:
                    lower_case: "logout user"
                description: "Logout the current user"
                func:
                    call: "auth.logout_user"
                    args:
                        mode:
                            params: {mode: {}}
                params:
                    mode:
                        name:
                            lower_case: "mode"
                        type: str
                        enum:
                            - "all"
                            - "current"
                            - "others"
                        description: "Logout mode, use all to logout from all sessions, current to logout from current session, others to logout all sessions except this one"
                result:
                    type: struct
                    fields:
                        acknowledged:
                            name:
                                lower_case: "acknowledged"
                            type: bool
                            description: "Whether the logout was successful"
                        message:
                            name:
                                lower_case: "message"
                            type: str
                            description: "Acknowledgement message"

            delete_user:
                name:
                    lower_case: "delete user"
                description: "Delete currently logged in user"
                func:
                    call: "auth.delete_user"
                    args: {}
                params: {}
                result:
                    type: struct
                    fields:
                        acknowledged:
                            name:
                                lower_case: "acknowledged"
                            type: bool
                            description: "Whether the deletion was successful"
                        message:
                            name:
                                lower_case: "message"
                            type: str
                            description: "Acknowledgement message"

            drop_sessions:
                name:
                    lower_case: "drop sessions"
                description: "Drop all sessions"
                func:
                    call: "auth.drop_sessions"
                    args:
                        root_password:
                            params: {root_password: {}}
                params:
                    root_password:
                        name:
                            lower_case: "root password"
                        type: str
                        secure_input: true
                        description: "Root password to authorize dropping all sessions"
                result:
                    type: struct
                    fields:
                        acknowledged:
                            name:
                                lower_case: "acknowledged"
                            type: bool
                            description: "Always true, indicates the operation was successful"
                        message:
                            name:
                                lower_case: "message"
                            type: str
                            description: "Acknowledgement message"

    file_system:
        name:
            lower_case: "file system"
        
        models:
            record:
                name:
                    lower_case: "record"
                description: "A record for where a file came from"
                auth:
                    require_login: true

                fields:
                    file_id:
                        name:
                            lower_case: "file id"
                        type: foreign_key
                        references:
                            module: "file_system"
                            table: "file"
                            field: "id"
                        examples:
                            - "1"
                            - "2"

                    description:
                        name:
                            lower_case: "description"
                        type: str
                        default: ""
                        examples:
                            - "a PDF of the project proposal"
                            - "a screenshot of the error message"

                    source:
                        name:
                            lower_case: "source"
                        type: str
                        default: ""
                        examples:
                            - "email attachment"
                            - "web upload"

                    url:
                        name:
                            lower_case: "url"
                        type: str
                        default: ""
                        examples:
                            - "https://example.com/file.pdf"
                            - "https://example.com/image.png"

                    note:
                        name:
                            lower_case: "note"
                        type: str
                        default: ""
                        examples:
                            - "This is the replacement file for id 374 which was corrupted during upload"
                            - "This file was provided by the user during support ticket #1234"

                    user_id:
                        name:
                            lower_case: "user id"
                        type: foreign_key
                        references:
                            module: "auth"
                            table: "user"
                            field: "id"
                        examples:
                            - "1"
                            - "2"

            file:
                hidden: true
                name:
                    lower_case: "file"

                auth:
                    require_login: true

                fields:
                    name:
                        name:
                            lower_case: "name"
                        type: str
                        examples:
                            - "document.txt"
                            - "image.png"

                    status:
                        name:
                            lower_case: "status"
                        type: str
                        enum:
                            - "ingesting"
                            - "processing_queue"
                            - "processing"
                            - "verify_queue"
                            - "verifying"
                            - "good"
                            - "error"
                        examples:
                            - "ingesting"
                            - "good"
                            - "error"

                    message:
                        name:
                            lower_case: "message"
                        type: str
                        examples:
                            - "File is being uploaded"
                            - "File upload completed successfully"
                            - "File upload failed due to network error"

                    extension:
                        name:
                            lower_case: "extension"
                        type: str
                        examples:
                            - "txt"
                            - "png"

                    size:
                        name:
                            lower_case: "size"
                        type: int
                        examples:
                            - 1024
                            - 2048

                    parts:
                        name:
                            lower_case: "parts"
                        type: int
                        examples:
                            - 1
                            - 2
                    
                    content_type:
                        name:
                            lower_case: "content type"
                        type: str
                        examples:
                            - "text/plain"
                            - "image/png"

                    user_id:
                        name:
                            lower_case: "user id"
                        type: foreign_key
                        references:
                            module: "auth"
                            table: "user"
                            field: "id"
                        examples:
                            - "1"
                            - "2"

                    created_at:
                        name:
                            lower_case: "created at"
                        type: datetime
                        examples:
                            - "2000-01-11T12:34:56"
                            - "2020-10-02T15:30:00"

                    updated_at:
                        name:
                            lower_case: "updated at"
                        type: datetime
                        examples:
                            - "2000-01-11T12:34:56"
                            - "2020-10-02T15:30:00"
                    
                    replication_policy_id:
                        name:
                            lower_case: "replication policy id"
                        type: foreign_key
                        default: "-1"
                        references:
                            module: "file_system"
                            table: "replication_policy"
                            field: "id"
                        examples:
                            - "1"
                            - "2"
                            - "-1"
                        description: "ID of the replication policy associated with this file for testing replication policy functionality, if not provided it will be set to -1 which indicates no replication policy"

                    sha3_256:
                        name:
                            lower_case: "sha3 256"
                        type: str
                        default: ""
                        examples:
                            - "3338be694f50c5f338814986cdf0686453a888b84f424d792af4b9202398f392"
                            - "2cf24dba5fb0a30e26e83b2ac5b9e29e1b161e5c1fa7425e73043362938b9824"
            
            file_part:
                hidden: true
                name:
                    lower_case: "file part"

                auth:
                    require_login: true

                fields:
                    file_id:
                        name:
                            lower_case: "file id"
                        type: foreign_key
                        references:
                            module: "file_system"
                            table: "file"
                            field: "id"
                        examples:
                            - "1"
                            - "2"

                    size:
                        name:
                            lower_case: "size"
                        type: int
                        examples:
                            - 512
                            - 1024

                    part_number:
                        name:
                            lower_case: "part number"
                        type: int
                        examples:
                            - 1
                            - 2

                    sha3_256:
                        name:
                            lower_case: "sha3 256"
                        type: str
                        examples:
                            - "3338be694f50c5f338814986cdf0686453a888b84f424d792af4b9202398f392"
                            - "2cf24dba5fb0a30e26e83b2ac5b9e29e1b161e5c1fa7425e73043362938b9824"

                    user_id:
                        name:
                            lower_case: "user id"
                        type: foreign_key
                        references:
                            module: "auth"
                            table: "user"
                            field: "id"
                        examples:
                            - "1"
                            - "2"

                    uploaded_at:
                        name:
                            lower_case: "uploaded at"
                        type: datetime
                        examples:
                            - "2000-01-11T12:34:56"
                            - "2020-10-02T15:30:00"
        
            file_repository:
                name:
                    lower_case: "file repository"
                description: "A repository for storing files in different locations such as local disk or cloud storage"
                auth:
                    require_login: true

                fields:
                    name:
                        name:
                            lower_case: "name"
                        type: str
                        examples:
                            - "local disk"
                            - "aws s3"

                    store_as:
                        name:
                            lower_case: "store as"
                        type: str
                        enum:
                            - "whole_file"
                            - "parts"
                        examples:
                            - "whole_file"
                            - "parts"
                    
                    root_path:
                        name:
                            lower_case: "root path"
                        type: str
                        examples:
                            - "/Volumes/StorageRoot"
                            - "/mnt/storage"
                    
                    user_id:
                        name:
                            lower_case: "user id"
                        type: foreign_key
                        references:
                            module: "auth"
                            table: "user"
                            field: "id"
                        examples:
                            - "1"
                            - "2"

            file_copy:
                name:
                    lower_case: "file copy"
                description: "A copy of a file for testing file copying functionality"
                auth:
                    require_login: true

                fields:
                    file_id:
                        name:
                            lower_case: "file id"
                        type: foreign_key
                        references:
                            module: "file_system"
                            table: "file"
                            field: "id"
                        examples:
                            - "1"
                            - "2"

                    repository_id:
                        name:
                            lower_case: "repository id"
                        type: foreign_key
                        references:
                            module: "file_repository"
                            table: "file_repository"
                            field: "id"
                        examples:
                            - "1"
                            - "2"
                    user_id:
                        name:
                            lower_case: "user id"
                        type: foreign_key
                        references:
                            module: "auth"
                            table: "user"
                            field: "id"
                        examples:
                            - "1"
                            - "2"

                    created_at:
                        name:
                            lower_case: "created at"
                        type: datetime
                        examples:
                            - "2000-01-11T12:34:56"
                            - "2020-10-02T15:30:00"
                    
                    last_verified_at:
                        name:
                            lower_case: "last verified at"
                        type: datetime
                        default: ""
                        examples:
                            - "2000-01-11T12:34:56"
                            - "2020-10-02T15:30:00"

            replication_policy:
                name:
                    lower_case: "replication policy"
                description: "A replication policy for files"

                auth:
                    require_login: true

                fields:
                    user_id:
                        name:
                            lower_case: "user id"
                        type: foreign_key
                        references:
                            module: "auth"
                            table: "user"
                            field: "id"
                        examples:
                            - "1"
                            - "2"
                            - "3"

                    repositories:
                        name:
                            lower_case: "repositories"
                        type: list
                        element_type: foreign_key
                        references:
                            module: "file_system"
                            table: "file_repository"
                            field: "id"
                        examples:
                            - ["1"]
                            - ["1", "2"]

        ops:

            ingest_start:
                name:
                    lower_case: "ingest start"
                description: "Start ingesting a file with name, size, parts, content type and extension. If content is supplied via self.file_input it will be uploaded as part 1. If finish is true and parts is 1 and part 1 is uploaded, the file will be marked as finished without needing to call ingest_part or ingest_finish separately."

                func:
                    call: "file_system.ingest_start"
                    args:
                        name:
                            params: {name: {}}
                        size:
                            params: {size: {}}
                        parts:
                            params: {parts: {}}
                        content_type:
                            params: {content_type: {}}
                        finish:
                            params: {finish: {}}
                
                params:
                    name:
                        name:
                            lower_case: "name"
                        type: str
                        description: "Name of the file being uploaded"
                    size:
                        name:
                            lower_case: "size"
                        type: int
                        description: "Total size of the file being uploaded in bytes"
                    parts:
                        name:
                            lower_case: "parts"
                        type: int
                        description: "Total number of parts the file is divided into for upload"
                    content_type:
                        name:
                            lower_case: "content type"
                        type: str
                        description: "MIME content type of the file such as 'text/plain' or 'image/png', if not provided it will be inferred from the file extension"
                        default: ""
                    finish:
                        name:
                            lower_case: "finish"
                        type: bool
                        description: "If true and parts is 1 and the file content was provided in the ingest_start call, the file will be marked as finished without needing to call ingest_part or ingest_finish separately. This is useful for small files that can be ingested in a single request. Otherwise, this should be false and ingest_part should be called for each part followed by ingest_finish to mark the ingest as complete."
                        default: false
                
                result:
                    type: struct
                    fields:
                        file_id:
                            name:
                                lower_case: "file id"
                            type: str
                            description: "ID of the file being uploaded, used for ingesting parts and finishing the upload"
                        message:
                            name:
                                lower_case: "message"
                            type: str
                            description: "Acknowledgement message for starting the file upload"
                            
            ingest_part:
                name:
                    lower_case: "ingest file part"
                description: "Ingest a part of a file with file id, part number and content"
                func:
                    call: "file_system.ingest_file_part"
                    args:
                        file_id:
                            params: {file_id: {}}
                        part_number:
                            params: {part_number: {}}
                params:
                    file_id:
                        name:
                            lower_case: "file id"
                        type: foreign_key
                        references:
                            module: "file_system"
                            table: "file"
                            field: "id"
                        description: "ID of the file being uploaded"
                    part_number:
                        name:
                            lower_case: "part number"
                        type: int
                        description: "Part number of the file being uploaded"
                result:
                    type: struct
                    fields:
                        acknowledged:
                            name:
                                lower_case: "acknowledged"
                            type: bool
                            description: "Whether the file part upload was successful"
                        message:
                            name:
                                lower_case: "message"
                            type: str
                            description: "Acknowledgement message for the file part upload" 

            ingest_finish:
                name:
                    lower_case: "ingest finish"
                description: "Finish ingesting a file with file id"
                func:
                    call: "file_system.ingest_finish"
                    args:
                        file_id:
                            params: {file_id: {}}
                params:
                    file_id:
                        name:
                            lower_case: "file id"
                        type: foreign_key
                        references:
                            module: "file_system"
                            table: "file"
                            field: "id"
                        description: "ID of the file being uploaded"
                result:
                    type: struct
                    fields:
                        acknowledged:
                            name:
                                lower_case: "acknowledged"
                            type: bool
                            description: "Whether the file upload was marked as finished successfully"
                        message:
                            name:
                                lower_case: "message"
                            type: str
                            description: "Acknowledgement message for finishing the file upload"

            get_part_content:
                name:
                    lower_case: "get part content"
                description: "Get the content of a file part with file id and part number, it's output depends on self.file_output being defined in the context"
                func:
                    call: "file_system.get_part_content"
                    args:
                        file_id:
                            params: {file_id: {}}
                        part_number:
                            params: {part_number: {}}
                params:
                    file_id:
                        name:
                            lower_case: "file id"
                        type: foreign_key
                        references:
                            module: "file_system"
                            table: "file"
                            field: "id"
                        description: "ID of the file being accessed"
                    part_number:
                        name:
                            lower_case: "part number"
                        type: int
                        description: "Part number of the file being accessed"
                result:
                    type: struct
                    fields:
                        acknowledged:
                            name:
                                lower_case: "acknowledged"
                            type: bool
                            description: "Whether the file part content retrieval was successful"
                        message:
                            name:
                                lower_case: "message"
                            type: str
                            description: "Acknowledgement message for the file part content retrieval"

            get_file_content:
                name:
                    lower_case: "get file content"
                description: "Get the content of a file with file id, it's output depends on self.file_output being defined in the context"
                func:
                    call: "file_system.get_file_content"
                    args:
                        file_id:
                            params: {file_id: {}}
                params:
                    file_id:
                        name:
                            lower_case: "file id"
                        type: foreign_key
                        references:
                            module: "file_system"
                            table: "file"
                            field: "id"
                        description: "ID of the file being accessed"
                result:
                    type: struct
                    fields:
                        acknowledged:
                            name:
                                lower_case: "acknowledged"
                            type: bool
                            description: "Whether the file content retrieval was successful"
                        message:
                            name:
                                lower_case: "message"
                            type: str
                            description: "Acknowledgement message for the file content retrieval"

            verify_file_copy:
                name:
                    lower_case: "verify file copy"
                description: "Verify a file copy with file id"
                func:
                    call: "files.verify_file_copy"
                    args:
                        file_id:
                            params: {file_id: {}}

                params:
                    file_id:
                        name:
                            lower_case: "file id"
                        type: foreign_key
                        references:
                            module: "file_system"
                            table: "file"
                            field: "id"
                        description: "ID of the file being verified"

                    repository_id:
                        name:
                            lower_case: "repository id"
                        type: foreign_key
                        default: "-1"
                        references:
                            module: "file_system"
                            table: "file_repository"
                            field: "id"
                        description: "ID of the repository to verify the file against for testing verification with different repositories, if not provided it will be set to -1 which indicates verifying against the default repository"

                result:
                    type: struct
                    fields:
                        verified:
                            name:
                                lower_case: "verified"
                            type: bool
                            description: "True if all file parts exist and are the correct size and hash; false otherwise"

                        message:
                            name:
                                lower_case: "message"
                            type: str
                            description: "Additional information about the verification result; such as error message if verification failed"
            
            delete_file:
                name:
                    lower_case: "delete file"
                description: "Delete a file with file id"
                func:
                    call: "file_system.delete_file"
                    args:
                        file_id:
                            params: {file_id: {}}
                params:
                    file_id:
                        name:
                            lower_case: "file id"
                        type: foreign_key
                        references:
                            module: "file_system"
                            table: "file"
                            field: "id"
                        description: "ID of the file being deleted"
                result:
                    type: struct
                    fields:
                        acknowledged:
                            name:
                                lower_case: "acknowledged"
                            type: bool
                            description: "Whether the file deletion was successful"
                        message:
                            name:
                                lower_case: "message"
                            type: str
                            description: "Acknowledgement message for the file deletion"

            list_files:
                name:
                    lower_case: "list files"
                description: "List files with pagination"
                func: 
                    call: "file_system.list_files"
                    args:
                        offset:
                            params: {offset: {}}
                        size:
                            params: {size: {}}
                        user_id:
                            params: {user_id: {}}
                        file_id:
                            params: {file_id: {}}
                        status:
                            params: {status: {}}
                params:
                    offset:
                        name:
                            lower_case: "offset"
                        type: int
                        description: "Number of files to skip for pagination"
                        default: 0

                    size:
                        name:
                            lower_case: "size"
                        type: int
                        description: "Number of files to return per page"
                        default: 50

                    user_id:
                        name:
                            lower_case: "user id"
                        type: foreign_key
                        default: "-1"
                        references:
                            module: "auth"
                            table: "user"
                            field: "id"
                        description: "ID of the user whose files to list, if not provided lists files for all users"
                    
                    file_id:
                        name:
                            lower_case: "file id"
                        type: foreign_key
                        default: "-1"
                        references:
                            module: "file_system"
                            table: "file"
                            field: "id"
                        description: "ID of the file to list, if provided lists only the file with this ID if it exists and the user has access to it"

                    status: 
                        name:
                            lower_case: "status"
                        type: str
                        enum:
                            - "all"
                            - "ingesting"
                            - "processing_queue"
                            - "processing"
                            - "verify_queue"
                            - "verifying"
                            - "good"
                            - "error"
                        default: "all"
                        description: "Filter files by status, if provided lists only files with this status"
                result:
                    type: struct
                    fields:
                        items:
                            name:
                                lower_case: "items"
                            type: list
                            description: "List of files for the current page"
                        
                        total:
                            name:
                                lower_case: "total"
                            type: int
                            description: "Total number of files available for pagination"

            list_parts:
                name:
                    lower_case: "list parts"
                description: "List file parts for a file with pagination"
                func:
                    call: "file_system.list_parts"
                    args:
                        file_id:
                            params: {file_id: {}}
                        offset:
                            params: {offset: {}}
                        size:
                            params: {size: {}}
                        user_id:
                            params: {user_id: {}}
                params:

                    offset:
                        name:
                            lower_case: "offset"
                        type: int
                        default: 0
                        description: "Number of file parts to skip for pagination"

                    size:
                        name:
                            lower_case: "size"
                        type: int
                        default: 50
                        description: "Number of file parts to return per page"

                    file_id:
                        name:
                            lower_case: "file id"
                        type: foreign_key
                        default: "-1"
                        references:
                            module: "file_system"
                            table: "file"
                            field: "id"
                        description: "ID of the file whose parts are being listed"

                    user_id:
                        name:
                            lower_case: "user id"
                        type: foreign_key
                        default: "-1"
                        references:
                            module: "auth"
                            table: "user"
                            field: "id"
                        description: "ID of the user whose file parts to list, if not provided lists file parts for all users"

                result:
                    type: struct
                    fields:
                        items:
                            name:
                                lower_case: "items"
                            type: list
                            description: "List of file parts for the current page"
                        
                        total:
                            name:
                                lower_case: "total"
                            type: int
                            description: "Total number of file parts available for pagination"

            process_file:
                name:
                    lower_case: "process file"
                description: "Assemble file parts to create final file"
                func:
                    call: "file_system.process_file"
                    args:
                        file_id:
                            params: {file_id: {}}
                params:
                    file_id:
                        name:
                            lower_case: "file id"
                        type: foreign_key
                        references:
                            module: "file_system"
                            table: "file"
                            field: "id"
                        description: "ID of the file being processed"
                result:
                    type: struct
                    fields:
                        acknowledged:
                            name:
                                lower_case: "acknowledged"
                            type: bool
                            description: "Whether the file processing was started successfully"
                        message:
                            name:
                                lower_case: "message"
                            type: str
                            description: "Acknowledgement message for starting the file processing"

            copy_file:
                name:
                    lower_case: "copy file"
                description: "Copy a file to a repository to create a file copy"
                func:
                    call: "file_system.copy_file"
                    args:
                        file_id:
                            params: {file_id: {}}
                        repository_id:
                            params: {repository_id: {}}
                params:
                    file_id:
                        name:
                            lower_case: "file id"
                        type: foreign_key
                        references:
                            module: "file_system"
                            table: "file"
                            field: "id"
                        description: "ID of the file being copied"

                    repository_id:
                        name:
                            lower_case: "repository id"
                        type: foreign_key
                        references:
                            module: "file_repository"
                            table: "file_repository"
                            field: "id"
                        description: "ID of the repository the file is being copied to"
                result:
                    type: struct
                    fields:
                        acknowledged:
                            name:
                                lower_case: "acknowledged"
                            type: bool
                            description: "Whether the file copy was started successfully"
                        message:
                            name:
                                lower_case: "message"
                            type: str
                            description: "Acknowledgement message for starting the file copy"
            
            replicate_file:
                name:
                    lower_case: "replicate file"
                description: "Call copy_file for each repository in the replication policy associated with the file to create file copies for replication"
                func:
                    call: "file_system.replicate_file"
                    args:
                        file_id:
                            params: {file_id: {}}
                params:
                    file_id:
                        name:
                            lower_case: "file id"
