                        examples:
                            - "1"
                            - "2"

                    format:
                        name:
                            lower_case: "format"
                        type: str
                        examples:
                            - "jpeg"
                            - "png"
                    
                    width:
                        name:
                            lower_case: "width"
                        type: int
                        examples:
                            - 800
                            - 600
                    
                    height:
                        name:
                            lower_case: "height"
                        type: int
                        examples:
                            - 800
                            - 600
                    
                    aspect_ratio:
