lingo:
    version: 'generator-beta-1'

project:
    name:
        lower_case: 'mtech'

    description: 'A simple social network'

    author:
        name: 'B rad C'
        email: 'sample@email.com'

server:
    port: 8008

client:
    default_host: 'http://localhost:8008'

index_page: 'social-front-page.yaml'

modules:
    social:
        name:
            lower_case: 'social'

        page: 'social-network-page.yaml'
        pages:
            account: 'builtin-mapp-page-account.yaml'

        models:
            profile:
                name:
                    lower_case: 'profile'

                page: 'social-profile.yaml'
                pages:
                    yours: 'social-profile-user.yaml'

                auth:
                    require_login: true
                    max_models_per_user: 1

                db:
                    indexes:
                        - name: 'idx_social_profile_user_id'
                          fields: ['user_id']
                          unique: true
                        - name: 'idx_social_profile_username'
                          fields: ['username']
                          unique: true

                fields:

                    user_id:
                        name:
                            lower_case: 'user id'
                        type: foreign_key
                        references:
                            module: 'auth'
                            table: 'user'
                            field: 'id'
                        examples:
                            - "1"
                            - "2"
                            - "3"

                    username:
                        name:
                            lower_case: 'username'
                        type: str
                        examples:
                            - "alice123"
                            - "bob_the_builder"
                            - "charlie.brown"
                            - "david-torrez"
                            - "eve~is~cool"
                        validation_errors:
                            - 'i-am-26-characters-longggg'
                            - 'invalid-username!'
                            - 'no spaces pls'
                            - 'no-$ymbols'
                            - '@bad-username'
                        random: random_user_name
                        unique: true
                        validation:
                            call: 'and'
                            args:
                                a:
                                    call: 'le'
                                    args:
                                        a:
                                            call: 'len'
                                            args:
                                                object:
                                                    self: 'value'
                                        b: 25
                                b:
                                    call: 're_match'
                                    args:
                                        pattern: '^[a-zA-Z0-9._~-]+$'
                                        string:
                                            self: 'value'
                        validation_message: 'must be 25 characters or less and only contain letters, numbers, hyphens, underscores, periods, and tildes'
                        

                    bio:
                        name:
                            lower_case: 'bio'
                        type: str
                        rich_text: true
                        examples:
                            - '{"lingo": {"version": "rich-text-beta-1"},"block": [{"text": "hello.world"}] }'
                            - '{"lingo": {"version": "rich-text-beta-1"},"block": [{"text": "lorem ipsum", "style": {"bold": true, "color": "green"}}]}'
                            - '{"lingo": {"version": "rich-text-beta-1"},"block": [{"text": "hello.world"}, {"break": 1}, {"text": "this.is.a.test"}]}'

                    profile_picture:
                        name:
                            lower_case: 'profile picture'
                        type: foreign_key
                        references:
                            module: 'media'
                            table: 'master_image'
                            field: 'id'
                        default: "-1"
                        examples:
                            - "1"
                            - "2"
                            - "-1"

            forum:
                name:
                    lower_case: 'forum'

                auth:
                    require_login: true

                db:
                    indexes:
                        - name: 'idx_social_forum_user_id'
                          fields: ['user_id']
                    # join aliases are reusable relation definitions for read/list/query calls
                    joins:
                        profile:
                            model_type: 'social.profile'
                            local_field: 'user_id'
                            foreign_field: 'user_id'
                            fields:
                                - 'username'

                page: 'social-forums.json'
                instance_page: 'social-forum-instance.json'

                fields:

                    user_id:
                        name:
                            lower_case: 'user id'
                        type: foreign_key
                        references:
                            module: 'auth'
                            table: 'user'
                            field: 'id'
                        examples:
                            - "1"
                            - "2"
                            - "3"

                    topic:
                        name:
                            lower_case: 'topic'
                        type: str
                        examples:
                            - 'Favorite Hiking Trails'
                            - 'Best Coffee Shops in Town'
                            - 'Latest Tech Gadgets'
                        
                        validation:
                            call: 'eq'
                            args:
                                a:
                                    call: 'key'
                                    args:
                                        key: 'total'
                                        default_value: 0
                                        object:
                                            call: 'db.query'
                                            args:
                                                model_type: 'social.profile'
                                                where:
                                                    user_id:
                                                        eq:
                                                            call: 'key'
                                                            args:
                                                                key: 'id'
                                                                object:
                                                                    call: 'auth.current_user'
                                b: 1
                        validation_message: 'You must have a profile to create a forum'

                    description:
                        name:
                            lower_case: 'description'
                        type: str
                        rich_text: true
                        examples:
                            - '{"lingo": {"version": "rich-text-beta-1"},"block": [{"text": "hello.world"}] }'
                            - '{"lingo": {"version": "rich-text-beta-1"},"block": [{"text": "lorem ipsum", "style": {"bold": true, "color": "green"}}]}'
                            - '{"lingo": {"version": "rich-text-beta-1"},"block": [{"text": "hello.world"}, {"break": 1}, {"text": "this.is.a.test"}]}'

                    tags:
                        name:
                            lower_case: 'tags'
                        type: list
                        element_type: str
                        examples:
                            - [ 'hiking', 'outdoors', 'nature' ]
                            - [ 'coffee', 'cafe', 'drinks' ]
                            - [ 'tech', 'gadgets', 'innovation' ]

            thread:
                name:
                    lower_case: 'thread'

                auth:
                    require_login: true

                db:
                    indexes:
                        - name: 'idx_social_thread_forum_id'
                          fields: ['forum_id']
                        - name: 'idx_social_thread_user_id'
                          fields: ['user_id']
                        - name: 'idx_social_thread_main_post_id'
                          fields: ['main_post_id']
                    joins:
                        profile:
                            model_type: 'social.profile'
                            local_field: 'user_id'
                            foreign_field: 'user_id'
                            fields:
                                - 'username'

                instance_page: 'social-thread-instance.json'

                fields:
                    user_id:
                        name:
                            lower_case: 'user id'
                        type: foreign_key
                        references:
                            module: 'auth'
                            table: 'user'
                            field: 'id'
                        examples:
                            - "1"
                            - "2"
                            - "3"
                    
                    forum_id:
                        name:
                            lower_case: 'forum id'
                        type: foreign_key
                        default: "-1"
                        references:
                            module: 'social'
                            table: 'forum'
                            field: 'id'
                        examples:
                            - "1"
                            - "2"
                            - "3"
                    
                    title:
                        name:
                            lower_case: 'title'
                        type: str
                        examples:
                            - 'My favorite PNW hiking trails'
                            - 'Favorite programming languages'
                            - 'Tips for cooking'
                    
                    main_post_id:
                        name:
                            lower_case: 'main post id'
                        description: 'The main post of the thread, always shown at the top'
                        type: foreign_key
                        references:
                            module: 'social'
                            table: 'post'
                            field: 'id'
                        examples:
                            - "1"
                            - "2"
                            - "3"




            post:
                name:
                    lower_case: 'post'

                auth:
                    require_login: true

                db:
                    indexes:
                        - name: 'idx_social_post_reply_to'
                          fields: ['reply_to']
                        - name: 'idx_social_post_user_id'
                          fields: ['user_id']
                        - name: 'idx_social_post_forum_id'
                          fields: ['forum_id']
                    joins:
                        profile:
                            model_type: 'social.profile'
                            local_field: 'user_id'
                            foreign_field: 'user_id'
                            fields:
                                - 'username'

                fields:

                    user_id:
                        name:
                            lower_case: 'user id'
                        type: foreign_key
                        references:
                            module: 'auth'
                            table: 'user'
                            field: 'id'
                        examples:
                            - "1"
                            - "2"
                            - "3"

                    forum_id:
                        name:
                            lower_case: 'forum id'
                        description: 'The forum this post belongs to, if -1 then it is not tied to a
                            forum and will show up in chatter'
                        type: foreign_key
                        references:
                            module: 'social'
                            table: 'forum'
                            field: 'id'
                        default: "-1"
                        examples:
                            - "1"
                            - "2"
                            - "3"

                    reply_to:
                        name:
                            lower_case: 'reply to'
                        description: 'The post this is a reply to, if -1 then it is not a reply'
                        type: foreign_key
                        references:
                            module: 'social'
                            table: 'post'
                            field: 'id'
                        default: "-1"
                        examples:
                            - "1"
                            - "2"
                            - "-1"

                    message:
                        name:
                            lower_case: 'message'
                        type: str
                        # rich_text: true
                        examples:
                            - '{"lingo": {"version": "rich-text-beta-1"},"block": [{"text": "hello.world"}] }'
                            - '{"lingo": {"version": "rich-text-beta-1"},"block": [{"text": "lorem ipsum", "style": {"bold": true, "color": "green"}}]}'
                            - '{"lingo": {"version": "rich-text-beta-1"},"block": [{"text": "hello.world"}, {"break": 1}, {"text": "this.is.a.test"}]}'

                    attachments:
                        name:
                            lower_case: 'attachments'
                        type: list
                        default: []
                        element_type: foreign_key
                        references:
                            module: 'file_system'
                            table: 'file'
                            field: 'id'
                        examples:
                            - [ "1", "2" ]
                            - [ "3" ]
                            - []

                    images:
                        name:
                            lower_case: 'images'
                        type: list
                        default: []
                        element_type: foreign_key
                        references:
                            module: 'media'
                            table: 'master_image'
                            field: 'id'
                        examples:
                            - [ "4", "5" ]
                            - [ "6" ]
                            - []

                    related_posts:
                        name:
                            lower_case: 'related posts'
                        type: list
                        default: []
                        element_type: foreign_key
                        references:
                            module: 'social'
                            table: 'post'
                            field: 'id'
                        examples:
                            - [ "7", "8" ]
                            - [ "9" ]
                            - []

            event:
                name:
                    lower_case: 'event'

                auth:
                    require_login: true

                fields:

                    user_id:
                        name:
                            lower_case: 'user id'
                        type: foreign_key
                        references:
                            module: 'auth'
                            table: 'user'
                            field: 'id'
                        examples:
                            - "1"
                            - "2"
                            - "3"

                    event_name:
                        name:
                            lower_case: 'event name'
                        type: str
                        examples:
                            - 'Birthday Party'
                            - 'Hiking Trip'
                            - 'Book Club Meeting'

                    event_start_time:
                        name:
                            lower_case: 'event start time'
                        type: datetime
                        examples:
                            - '2023-10-15T18:00:00'
                            - '2023-11-20T09:30:00'
                            - '2023-12-05T14:00:00'

                    event_end_time:
                        name:
                            lower_case: 'event end time'
                        type: datetime
                        examples:
                            - '2023-10-15T21:00:00'
                            - '2023-11-20T12:30:00'
                            - '2023-12-05T17:00:00'

                    location:
                        name:
                            lower_case: 'location'
                        type: str
                        examples:
                            - 'Central Park'
                            - 'Downtown Cafe'
                            - 'City Library'

                    description:
                        name:
                            lower_case: 'description'
                        type: str
                        # rich_text: true
                        examples:
                            - '{"lingo": {"version": "rich-text-beta-1"},"block": [{"text": "hello.world"}] }'
                            - '{"lingo": {"version": "rich-text-beta-1"},"block": [{"text": "lorem ipsum", "style": {"bold": true, "color": "green"}}]}'
                            - '{"lingo": {"version": "rich-text-beta-1"},"block": [{"text": "hello.world"}, {"break": 1}, {"text": "this.is.a.test"}]}'

            reaction:
                name:
                    lower_case: 'reaction'

                auth:
                    require_login: true
                    max_models_by_field:
                        post_id: 1 # only allow one reaction per user per post

                db:
                    indexes:
                        - name: 'idx_social_reaction_post_id'
                          fields: ['post_id']
                        - name: 'idx_social_reaction_user_id_post_id'
                          fields: ['user_id', 'post_id']
                          unique: true
                        - name: 'idx_social_reaction_post_id_reaction_type'
                          fields: ['post_id', 'reaction_type']

                fields:

                    user_id:
                        name:
                            lower_case: 'user id'
                        type: foreign_key
                        references:
                            module: 'auth'
                            table: 'user'
                            field: 'id'
                        examples:
                            - "1"
                            - "2"
                            - "3"

                    post_id:
                        name:
                            lower_case: 'post id'
                        type: foreign_key
                        references:
                            module: 'social'
                            table: 'post'
                            field: 'id'
                        examples:
                            - "1"
                            - "2"
                            - "3"

                    reaction_type:
                        name:
                            lower_case: 'reaction type'
                        type: str
                        enum:
                            - '🙂'
                            - '❤️'
                            - '😂'
                            - '👍'
                            - '👎'
                            - '😢'
                            - '😡'
                            - '😬'
                            - '🥱'
                            - '😮'
                            - '🤔'
                        examples:
                            - '🙂'
                            - '❤️'
                            - '😂'
                            - '👍'

        ops:
            get_post_and_reactions:
                name:
                    lower_case: 'get post and reactions'

                description: 'Get a post and its reactions by id'
                func:
                    type: struct
                    value:
                        post:
                            call: 'db.read'
                            args:
                                model_id:
                                    params: { post_id: {} }
                                model_type: 'social.post'
                        reactions:
                            call: 'db.unique_counts'
                            args:
                                model_type: 'social.reaction'
                                group_by:
                                    type: str
                                    value: 'reaction_type'
                                filters:
                                    type: struct
                                    value:
                                        post_id:
                                            params: { post_id: {} }

                params:
                    post_id:
                        name:
                            lower_case: 'post id'
                        type: foreign_key
                        references:
                            module: 'social'
                            table: 'post'
                            field: 'id'
                        examples:
                            - "1"
                            - "2"
                            - "3"

                result:
                    type: struct
                    fields:
                        post:
                            name:
                                lower_case: 'post'
                            type: struct
                        reaction_counts:
                            name:
                                lower_case: 'reaction counts'
                            description: 'Keys are the reaction type and values are the count of each
                                reaction for the post'
                            type: struct

            get_current_user_profile:
                name:
                    lower_case: 'get current user profile'

                description: 'Get the profile of the currently logged in user'
                func:
                    type: struct
                    value:
                        profile:
                            call: 'db.query'
                            args:
                                model_type: 'social.profile'
                                where:
                                    type: struct
                                    value:
                                        user_id:
                                            eq:
                                                call: 'key'
                                                args:
                                                    key: 'id'
                                                    object:
                                                        call: 'auth.current_user'
                                                        args: {}

                params: {}

                result:
                    type: struct
                    fields:
                        profile:
                            name:
                                lower_case: 'profile'
                            type: struct

            get_threads_for_forum:
                name:
                    lower_case: 'get threads for forum'

                description: 'Get all threads for a forum by forum id'
                func:
                    type: struct
                    value:
                        forum:
                            branch:
                                - if:
                                      call: 'eq'
                                      args:
                                          a: { params: { forum_id: {} } }
                                          b: "-1"
                                  then:
                                      type: struct
                                      value:
                                          id: "-1"
                                          user_id: "-1"
                                          topic: "Chatter"
                                          description: "A place for off topic threads"
                                          tags: []
                                - else:
                                      call: 'db.read'
                                      args:
                                          model_id:
                                              params: { forum_id: {} }
                                          model_type: 'social.forum'
                        threads:
                            call: 'db.query'
                            args:
                                model_type: 'social.thread'
                                offset:
                                    params: { offset: {} }
                                size:
                                    params: { size: {} }
                                where:
                                    type: struct
                                    value:
                                        forum_id:
                                            eq:
                                                params: { forum_id: {} }

                params:
                    forum_id:
                        name:
                            lower_case: 'forum id'
                        type: foreign_key
                        references:
                            module: 'social'
                            table: 'forum'
                            field: 'id'
                        examples:
                            - "1"
                            - "2"
                            - "3"

                    offset:
                        name:
                            lower_case: 'offset'
                        type: int
                        default: 0
                        examples:
                            - "0"
                            - "10"
                            - "20"

                    size:
                        name:
                            lower_case: 'size'
                        type: int
                        default: 25
                        examples:
                            - "10"
                            - "20"
                            - "50"

                result:
                    type: struct
                    fields:
                        forum:
                            name:
                                lower_case: 'forum'
                            type: struct
                        threads:
                            name:
                                lower_case: 'threads'
                            type: list
                            element_type: struct

                        total:
                            name:
                                lower_case: 'total'
                            type: int

            get_replies_for_post:
                name:
                    lower_case: 'get replies for post'

                description: 'Get all replies for a post by post id, including author username and reaction counts'
                func:
                    type: struct
                    self:
                        current_user_id:
                            call: 'key'
                            args:
                                key: 'id'
                                object:
                                    call: 'auth.current_user'
                                    args: {}
                        replies_query:
                            call: 'db.query'
                            args:
                                model_type: 'social.post'
                                offset:
                                    params: { offset: {} }
                                size:
                                    params: { size: {} }
                                sort:
                                    - field: 'date_modified'
                                      order: 'desc'
                                where:
                                    reply_to:
                                        eq:
                                            params: { post_id: {} }
                                include:
                                    alias: 'profile'
                                    model_type: 'social.profile'
                                    local_field: 'user_id'
                                    foreign_field: 'user_id'
                                    fields:
                                        - 'id'
                                        - 'username'
                                unique_counts:
                                    type: list
                                    value:
                                        # for each reply row, count reactions where reaction.post_id == reply.id grouped by emoji
                                        - alias: 'reaction_counts'
                                          model_type: 'social.reaction'
                                          source_field: 'id'
                                          foreign_field: 'post_id'
                                          group_by: 'reaction_type'
                    value:
                        replies:
                            type: struct
                            value:
                                total:
                                    call: 'key'
                                    args:
                                        object:
                                            self: replies_query
                                        key: 'total'
                                items:
                                    call: 'map'
                                    args:
                                        function:
                                            type: struct
                                            value:
                                                id:
                                                    call: 'key'
                                                    args:
                                                        object:
                                                            self: item
                                                        key: 'id'
                                                date_modified:
                                                    call: 'key'
                                                    args:
                                                        object:
                                                            self: item
                                                        key: 'date_modified'
                                                message:
                                                    call: 'key'
                                                    args:
                                                        object:
                                                            self: item
                                                        key: 'message'
                                                profile:
                                                    type: struct
                                                    value:
                                                        id:
                                                            call: 'key'
                                                            args:
                                                                object:
                                                                    self: item
                                                                key: 'profile.id'
                                                                default_value: '-1'
                                                        username:
                                                            call: 'key'
                                                            args:
                                                                object:
                                                                    self: item
                                                                key: 'profile.username'
                                                                default_value: 'anonymous'
                                                reaction_counts:
                                                    call: 'key'
                                                    args:
                                                        object:
                                                            self: item
                                                        key: 'reaction_counts'
                                                        default_value: []
                                                user_reaction:
                                                    call: 'key'
                                                    args:
                                                        object:
                                                            call: 'db.query'
                                                            args:
                                                                model_type: 'social.reaction'
                                                                size: 1
                                                                where:
                                                                    type: struct
                                                                    value:
                                                                        user_id:
                                                                            eq:
                                                                                self: current_user_id
                                                                        post_id:
                                                                            eq:
                                                                                call: 'key'
                                                                                args:
                                                                                    object:
                                                                                        self: item
                                                                                    key: 'id'
                                                        key: 'items.0.reaction_type'
                                                        default_value: ''
                                        iterable:
                                            call: 'key'
                                            args:
                                                object:
                                                    self: replies_query
                                                key: 'items'

                params:
                    post_id:
                        name:
                            lower_case: 'post id'
                        type: foreign_key
                        references:
                            module: 'social'
                            table: 'post'
                            field: 'id'
                        examples:
                            - "1"
                            - "2"
                            - "3"

                    offset:
                        name:
                            lower_case: 'offset'
                        type: int
                        default: 0
                        examples:
                            - "0"
                            - "10"
                            - "20"

                    size:
                        name:
                            lower_case: 'size'
                        type: int
                        default: 25
                        examples:
                            - "10"
                            - "20"
                            - "50"

                result:
                    type: struct
                    fields:
                        replies:
                            name:
                                lower_case: 'replies'
                            type: list
                            element_type: struct

                        total:
                            name:
                                lower_case: 'total'
                            type: int

            create_thread:
                name:
                    lower_case: 'create thread'
                description: 'Create a new thread and main post in a forum'
                func:
                    type: struct
                    value:
                        thread_id:
                            call: 'db.create'
                            args:
                                model_type: 'social.thread'
                                data:
                                    forum_id:
                                        params: { forum_id: {} }

                                    title:
                                        params: { title: {} }

                                    user_id: '-1'
                                    
                                    main_post_id:
                                        call: 'db.create'
                                        args:
                                            model_type: 'social.post'
                                            data:
                                                forum_id:
                                                    params: { forum_id: {} }
                                                reply_to: '-1'
                                                message:
                                                    params: { message: {} }
                                                attachments:
                                                    params: { attachments: {} }
                                                images:
                                                    params: { images: {} }
                                                user_id: '-1'

                params:
                    forum_id:
                        name:
                            lower_case: 'forum id'
                        type: foreign_key
                        references:
                            module: 'social'
                            table: 'forum'
                            field: 'id'
                        examples:
                            - "1"
                            - "2"
                            - "3"

                    title:
                        name:
                            lower_case: 'title'
                        type: str
                        examples:
                            - "General Discussion"
                            - "Announcements"
                            - "Feedback"

                    message:
                        name:
                            lower_case: 'message'
                        type: str
                        examples:
                            - "Welcome to the general discussion forum!"
                            - "Here are the latest announcements."
                            - "We value your feedback and suggestions."
                    
                    attachments:
                        name:
                            lower_case: 'attachments'
                        type: list
