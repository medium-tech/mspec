                                module: 'social'
                                table: 'thread'
                                field: 'id'
            
            get_thread_and_post:
                name:
                    lower_case: 'get thread and post'
                description: 'Get a thread and its main post by thread id, including owner username and reaction counts'
                func:
                    type: struct
                    self:
                        thread:
                            call: 'db.read'
                            args:
                                model_id:
                                    params: { thread_id: {} }
                                model_type: 'social.thread'
                                include:
                                    alias: 'profile'
                                    model_type: 'social.profile'
                                    local_field: 'user_id'
                                    foreign_field: 'user_id'
                                    fields:
                                        - 'username'
                    value:
                        thread: {self: thread}
                        main_post:
                            call: 'db.read'
                            args:
                                model_id:
                                    call: 'key'
                                    args:
                                        key: 'main_post_id'
                                        object:
                                            self: thread
                                model_type: 'social.post'
                                include:
                                    alias: 'profile'
                                    model_type: 'social.profile'
                                    local_field: 'user_id'
                                    foreign_field: 'user_id'
                                    fields:
                                        - 'id'
                                        - 'username'
                        main_post_reaction_counts:
                            call: 'db.unique_counts'
                            args:
                                model_type: 'social.reaction'
                                group_by: 'reaction_type'
                                filters:
                                    type: struct
                                    value:
                                        post_id:
                                            call: 'key'
                                            args:
                                                key: 'main_post_id'
                                                object:
                                                    self: thread
                        current_user_main_post_reaction:
                            call: 'key'
                            args:
                                object:
                                    call: 'db.query'
                                    args:
                                        model_type: 'social.reaction'
                                        size: 1
                                        where:
                                            type: struct
                                            value:
                                                post_id:
                                                    eq:
                                                        call: 'key'
                                                        args:
                                                            key: 'main_post_id'
                                                            object:
                                                                self: thread
                                                user_id:
                                                    eq:
                                                        call: 'key'
                                                        args:
                                                            key: 'id'
                                                            object:
                                                                call: 'auth.current_user'
                                                                args: {}
                                key: 'items.0.reaction_type'
                                default_value: ''
                        forum:
                            branch:
                                - if:
                                    call: 'eq'
                                    args:
                                        a: 
                                            call: 'key'
                                            args:
                                                key: 'forum_id'
                                                object:
                                                    self: thread
                                        b: "-1"
                                  then:
                                    type: struct
                                    value:
                                        id: "-1"
                                        user_id: "-1"
                                        topic: "Chatter"
                                        description: "A place for off topic threads"
                                        tags: []
                                - else:
                                      call: 'db.read'
                                      args:
                                          model_id:
                                            call: 'key'
                                            args:
                                                key: 'forum_id'
                                                object:
                                                    self: thread
                                          model_type: 'social.forum'

                params:
                    thread_id:
                        name:
                            lower_case: 'thread id'
                        type: foreign_key
                        references:
                            module: 'social'
                            table: 'thread'
                            field: 'id'
                        examples:
                            - "1"
                            - "2"
                            - "3"

                result:
                    type: struct
                    fields:
                        thread:
                            name:
                                lower_case: 'thread'
                            type: struct
                        main_post:
                            name:
                                lower_case: 'main post'
                            type: struct
                        main_post_reaction_counts:
                            name:
                                lower_case: 'main post reaction counts'
                            type: list
                            element_type: struct
                        current_user_main_post_reaction:
                            name:
                                lower_case: 'current user main post reaction'
                            type: str
                        forum:
                            name:
                                lower_case: 'forum'
                            type: struct

            react_to_thread_main_post:
