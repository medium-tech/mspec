lingo:
    version: 'generator-beta-1'

project:

    name:
        lower_case: 'op testing'

    description: 'A test project for testing mapp ops'

    author:
        name: 'B rad C'
        email: 'sample@email.com'

server:
    port: 2002

client:
    default_host: 'http://localhost:2002'

modules:
    op_testing:
        name:
            lower_case: 'op testing'

        ops:
            say_hello:
                name:
                    lower_case: 'say hello'
                description: 'Return a greeting message'
                func:
                    call: concat
                    args:
                        items:
                            - 'Hello, '
                            - params: { name: {} }
                            - '!'
                params:
                    name:
                        name:
                            lower_case: 'name'
                        type: str
                        description: 'Name of the person to greet'

                result:
                    type: str
                    description: 'Greeting message'

                tests:
                    test_cases:
                        - params:
                              name: 'Alice'
                          expected_result: 'Hello, Alice!'
                          name: 'Test with Alice'
                        - params:
                              name: 'Bob'
                          expected_result: 'Hello, Bob!'
                          name: 'Test with Bob'
