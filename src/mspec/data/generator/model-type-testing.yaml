            limit_a:
                name:
                    lower_case: 'limit a'

                description: 'A model to test max_models_per_user limit of 0 (cannot create
                    models)'

                auth:
                    require_login: true
                    max_models_per_user: 0

                fields:
                    user_id:
                        name:
                            lower_case: 'user id'
                        type: foreign_key
                        references:
                            module: 'auth'
                            table: 'user'
                            field: 'id'
                        examples:
                            - "1"
                            - "2"
                            - "3"
                    my_field:
                        name:
                            lower_case: 'my field'
                        type: str
                        examples:
                            - "example1"
                            - "example2"

            limit_b:
                name:
                    lower_case: 'limit b'

                description: 'A model to test max_models_per_user limit of 1'

                auth:
                    require_login: true
                    max_models_per_user: 1

                fields:

                    user_id:
                        name:
                            lower_case: 'user id'
                        type: foreign_key
                        references:
                            module: 'auth'
                            table: 'user'
                            field: 'id'
                        examples:
                            - "1"
                            - "2"
                            - "3"

                    my_field:
                        name:
                            lower_case: 'my field'
                        type: str
                        examples:
                            - "example1"
                            - "example2"

            limit_c:
                name:
                    lower_case: 'limit c'

                description: 'A model to test max_models_per_user limit of 5'

                auth:
                    require_login: true
                    max_models_per_user: 2

                fields:

                    user_id:
                        name:
                            lower_case: 'user id'
                        type: foreign_key
                        references:
                            module: 'auth'
                            table: 'user'
                            field: 'id'
                        examples:
                            - "1"
                            - "2"
                            - "3"

                    my_field:
                        name:
                            lower_case: 'my field'
                        type: str
                        examples:
                            - "example1"
                            - "example2"

            limit_d:
                name:
                    lower_case: 'limit d'

                description: 'A model to test max_models_by_field limit of 1 per my_field value'

                auth:
                    require_login: true
                    max_models_by_field:
                        my_field: 1

                fields:

                    user_id:
                        name:
                            lower_case: 'user id'
                        type: foreign_key
                        references:
                            module: 'auth'
                            table: 'user'
                            field: 'id'
                        examples:
                            - "1"
                            - "2"
                            - "3"

                    my_field:
                        name:
                            lower_case: 'my field'
                        type: str
                        examples:
                            - "example1"
                            - "example2"

            unique_test:
                name:
                    lower_case: 'unique test'

                description: 'A model to test the unique field constraint'

                fields:

                    unique_string:
                        name:
                            lower_case: 'unique string'
                        type: str
                        unique: true
                        examples:
                            - "unique_val_1"
                            - "unique_val_2"

            single_choice_fk:
                name:
                    lower_case: 'single choice fk'

                description: 'A model with various single choice foreign key field types for
                    testing purposes'

                fields:

                    x_fk_field:
                        name:
                            lower_case: 'x fk field'
                        type: foreign_key
                        references:
                            module: 'model_type_tests'
                            table: 'single_choice_fields'
                            field: 'id'
                        examples:
                            - "1"
                            - "2"

                    x_fk_file:
                        name:
                            lower_case: 'x fk file'
                        type: foreign_key
                        references:
                            module: 'file_system'
                            table: 'file'
                            field: 'id'
                        examples:
                            - "1"
                            - "2"

                    x_fk_image:
                        name:
                            lower_case: 'x fk image'
                        type: foreign_key
                        references:
                            module: 'media'
                            table: 'image'
                            field: 'id'
                        examples:
                            - "1"
                            - "2"

                    x_fk_master_image:
                        name:
                            lower_case: 'x fk master image'
                        type: foreign_key
                        references:
                            module: 'media'
                            table: 'master_image'
                            field: 'id'
                        examples:
                            - "1"
                            - "2"

            multi_choice_fk:
                name:
                    lower_case: 'multi choice fk'

                description: 'A model with various multi choice foreign key field types for
                    testing purposes'

                fields:

                    x_list_fk_field:
                        name:
                            lower_case: 'x list fk field'
                        type: list
                        element_type: foreign_key
                        references:
                            module: 'model_type_tests'
                            table: 'single_choice_fields'
                            field: 'id'
                        default: []
                        examples:
                            - [ "1", "2" ]
                            - [ "1", "2" ]

                    x_list_fk_file:
                        name:
                            lower_case: 'x list fk file'
                        type: list
                        element_type: foreign_key
                        references:
                            module: 'file_system'
                            table: 'file'
                            field: 'id'
                        default: []
                        examples:
                            - [ "1", "2" ]
                            - [ "1", "2" ]

                    x_list_fk_image:
                        name:
                            lower_case: 'x list fk image'
                        type: list
                        element_type: foreign_key
                        references:
                            module: 'media'
                            table: 'image'
                            field: 'id'
                        default: []
                        examples:
                            - [ "1", "2" ]
                            - [ "1", "2" ]

                    x_list_fk_master_image:
                        name:
                            lower_case: 'x list fk master image'
                        type: list
                        element_type: foreign_key
                        references:
                            module: 'media'
                            table: 'master_image'
                            field: 'id'
                        default: []
                        examples:
                            - [ "1", "2" ]
                            - [ "1", "2" ]

            rich_text_fields:
                name:
                    lower_case: 'rich text fields'

                description: 'A model with rich text fields for testing purposes'

                fields:

                    x_rich_text:
                        name:
                            lower_case: 'x rich text'
                        type: str
                        rich_text: true
                        examples:
                            - '{"lingo": {"version": "rich-text-beta-1"},"block": [{"text": "hello.world"}] }'
                            - '{"lingo": {"version": "rich-text-beta-1"},"block": [{"text": "lorem ipsum", "style": {"bold": true, "color": "green"}}]}'
                            - '{"lingo": {"version": "rich-text-beta-1"},"block": [{"text": "hello.world"}, {"break": 1}, {"text": "this.is.a.test"}]}'