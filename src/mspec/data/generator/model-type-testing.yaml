lingo:
    version: 'generator-beta-1'

project:

    name:
        lower_case: 'model type testing'

    description: 'A test project for testing various data types in the mapp framework'

    author:
        name: 'B rad C'
        email: 'sample@email.com'

server:
    port: 2002

client:
    default_host: 'http://localhost:2002'

modules:
    model_type_tests:
        name:
            lower_case: 'model type tests'

        models:
            single_choice_fields:
                name:
                    lower_case: 'single choice fields'

                description: 'A model with various single choice field types for testing
                    purposes'

                fields:

                    x_bool:
                        name:
                            lower_case: 'x bool'
                        type: bool
                        examples:
                            - false
                            - true
                        validation_errors:
                            - 0
                            - 1.2
                            - "true"
                            - "false"
                            - "yes"
                            - ""
                            - []
                            - {}
                            - null
                            - [ false ]

                    x_int:
                        name:
                            lower_case: 'x int'
                        type: int
                        examples:
                            - 101
                            - 202
                            - 3
                        validation_errors:
                            - true
                            - false
                            - 1.5
                            - "123"
                            - "abc"
                            - ""
                            - []
                            - {}
                            - null
                            - [ 1, 2 ]

                    x_float:
                        name:
                            lower_case: 'x float'
                        type: float
                        examples:
                            - 21.99
                            - 0.99
                            - 1.01
                            - 2 # have to support this bc of JS - should drop support in future
                        validation_errors:
                            - true
                            - false
                            - "123.45"
                            - "abc"
                            - ""
                            - []
                            - {}
                            - null
                            - [ 2.3 ]

                    x_string:
                        name:
                            lower_case: 'x string'
                        type: str
                        examples:
                            - "piano"
                            - "guitar"
                            - "drum"
                            - "saxophone"

                        validation_errors:
                            - true
                            - false
                            - 123
                            - 45.67
                            - []
                            - {}
                            - null
                            - [ "valid string" ] # lists should not be valid for string fields

                    x_enum:
                        name:
                            lower_case: 'x enum'
                        type: str
                        enum:
                            - taco
                            - tlayuda
                            - chilaquiles
                            - tamales

                        examples:
                            - tlayuda
                            - taco

                        validation_errors:
                            - true
                            - false
                            - 123
                            - 45.67
                            - "burrito"
                            - ""
                            - []
                            - {}
                            - null
                            - [ "taco" ]

                    x_datetime:
                        name:
                            lower_case: 'x datetime'
                        type: datetime
                        examples:
                            - "2000-01-11T12:34:56"
                            - "2020-10-02T15:30:00"

                        validation_errors:
                            - true
                            - false
                            - 123
                            - 45.67
                            - "2020-64-01T00:00:00"
                            - "not a datetime"
                            - ""
                            - []
                            - {}
                            - null
                            - [ "2020-11-01T00:00:00" ]

            multi_choice_fields:
                name:
                    lower_case: 'multi choice fields'

                description: 'A model with various multi choice field types for testing
                    purposes'

                fields:

                    x_list_bool:
                        name:
                            lower_case: 'x list bool'
                        type: list
                        element_type: bool
                        examples:
                            - [ true, false ]
                            - [ false, true, true ]
                        validation_errors:
                            - true
                            - false
                            - 1.5
                            - "true"
                            - "false"
                            - "yes"
                            - ""
                            - {}
                            - null
                            - [ 0, 1 ]
                            - [ "true", "false" ]
                            - [ true, 0 ]

                    x_list_int:
                        name:
                            lower_case: 'x list int'
                        type: list
                        element_type: int
                        examples:
                            - [ 7, 11 ]
                            - [ 42, 16, 109, 4 ]
                        validation_errors:
                            - true
                            - false
                            - 1.5
                            - "abc"
                            - ""
                            - {}
                            - null
                            - [ "123", "456" ]
                            - [ [ 1, 2 ], [ 3, 4 ] ]

                    x_list_float:
                        name:
                            lower_case: 'x list float'
                        type: list
                        element_type: float
                        examples:
                            - [ 3.14, 2.718 ]
                            - [ 1.618, 0.577 ]
                            - [ 0, 1, 2 ] # have to support this bc of JS - should drop support in future w/ a js update
                        validation_errors:
                            - true
                            - false
                            - 1.5
                            - "abc"
                            - ""
                            - {}
                            - null
                            - [ "123.45", "67.89" ]
                            - [ [ 1.1, 2.2 ], [ 3.3, 4.4 ] ]

                    x_list_string:
                        name:
                            lower_case: 'x list string'
                        type: list
                        element_type: str
                        examples:
                            - [ "banana" ]
                            - [ "extravagantly long string" ]
                            - [ "amplitude", "hello world" ]
                        validation_errors:
                            - true
                            - 123
                            - 45.67
                            - ""
                            - {}
                            - null
                            - [ [ "valid string" ] ]

                    x_list_enum:
                        name:
                            lower_case: 'x list enum'
                        type: list
                        element_type: str
                        enum:
                            - chorizo
                            - carne
                            - al pastor
                            - pollo

                        examples:
                            - [ "chorizo", "al pastor" ]
                            - [ "carne" ]

                        validation_errors:
                            - true
                            - 123
                            - 45.67
                            - "burrito"
                            - ""
                            - {}
                            - null
                            - [ 'barbacoa', 'chorizo' ] # barbacoa is not in the enum
                            - [ [ "chorizo" ] ]
                            - [ [ "burrito" ] ]

                    x_list_datetime:
                        name:
                            lower_case: 'x list datetime'
                        type: list
                        element_type: datetime
                        examples:
                            - [ "2000-01-11T12:34:56" ]
                            - [ "2020-10-02T15:30:00", "2021-01-01T00:00:00" ]

                        validation_errors:
                            - true
                            - 123
                            - 45.67
                            - "not a datetime"
                            - ""
                            - {}
                            - null
                            - [ "2020-64-01T00:00:00" ] # invalid datetime
                            - [ [ "2020-10-02T15:30:00" ] ] # lists should not be valid for datetime fields

