lingo:
  version: 'generator-beta-1'
project:
  name:
    lower_case: 'my sample store'

  description: 'A sample project for mspec-alpha python app generator'

  author:
    name: 'B rad C'
    email: 'sample@email.com'

server:
  port: 7007

client:
  default_host: 'http://localhost:7007'

modules:
  store:
    name:
      lower_case: 'store'

    models:
      products:
        name:
          lower_case: 'products'

        fields:

          product_name:
            name:
              lower_case: 'product name'
            type: str
            examples:
              - 'Laptop'
              - 'Smartphone'
              - 'Tablet'

            random: random_thing_name

          price:
            name:
              lower_case: 'price'
            type: float
            examples:
              - 999.99
              - 499.99
              - 299.99

          in_stock:
            name:
              lower_case: 'in stock'
            type: bool
            examples:
              - true
              - false
      
      customers:
        name:
          lower_case: 'customers'

        fields:

          customer_name:
            name:
              lower_case: 'customer name'
            type: str
            examples:
              - 'Alice'
              - 'Bob'
              - 'Charlie'
            random: random_person_name

          email:
            name:
              lower_case: 'email'
            type: str
            examples:
              - 'alice@email.com'
              - 'bob@email.com'
            random: random_email

          phone_number:
            name:
              lower_case: 'phone number'
            type: str
            examples:
              - '+1 (123) 456-7890'
              - '+1 (987) 654-3210'
            random: random_phone_number
