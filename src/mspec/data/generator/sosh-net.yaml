lingo:
    version: 'generator-beta-1'

project:
    name:
        lower_case: 'sosh net'

    description: 'A simple social network'

    author:
        name: 'B rad C'
        email: 'sample@email.com'

server:
    port: 8008

client:
    default_host: 'http://localhost:8008'

index_page: 'sosh-front-page.yaml'

modules:
    sosh_net:
        name:
            lower_case: 'sosh net'

        page: 'sosh-network-page.yaml'
        pages:
            account: 'builtin-mapp-page-account.yaml'

        models:
            profile:
                name:
                    lower_case: 'profile'

                page: 'sosh-profile.yaml'
                pages:
                    hello: 'hello-world-page.yaml'

                auth:
                    require_login: true
                    max_models_per_user: 1

                fields:

                    user_id:
                        name:
                            lower_case: 'user id'
                        type: foreign_key
                        references:
                            module: 'auth'
                            table: 'user'
                            field: 'id'
                        examples:
                            - "1"
                            - "2"
                            - "3"

                    username:
                        name:
                            lower_case: 'username'
                        type: str
                        examples:
                            - "alice123"
                            - "bob_the_builder"
                            - "charlie_brown"
                        random: random_user_name
                        unique: true

                    bio:
                        name:
                            lower_case: 'bio'
                        type: str
                        examples:
                            - 'Loves hiking and outdoor adventures.'
                            - 'Avid reader and coffee enthusiast.'
                            - 'Tech geek and gamer.'

                    profile_picture:
                        name:
                            lower_case: 'profile picture'
                        type: foreign_key
                        references:
                            module: 'media'
                            table: 'master_image'
                            field: 'id'
                        default: "-1"
                        examples:
                            - "1"
                            - "2"
                            - "-1"

            forum:
                name:
                    lower_case: 'forum'

                auth:
                    require_login: true

                page: 'sosh-forums.json'
                instance_page: 'sosh-forum-instance.json'

                fields:

                    user_id:
                        name:
                            lower_case: 'user id'
                        type: foreign_key
                        references:
                            module: 'auth'
                            table: 'user'
                            field: 'id'
                        examples:
                            - "1"
                            - "2"
                            - "3"

                    topic:
                        name:
                            lower_case: 'topic'
                        type: str
                        examples:
                            - 'Favorite Hiking Trails'
                            - 'Best Coffee Shops in Town'
                            - 'Latest Tech Gadgets'

                    description:
                        name:
                            lower_case: 'description'
                        type: str
                        examples:
                            - 'Share your favorite hiking trails and tips!'
                            - 'Discuss the best coffee shops in our city.'
                            - 'Talk about the latest tech gadgets and
                              innovations.'

                    tags:
                        name:
                            lower_case: 'tags'
                        type: list
                        element_type: str
                        examples:
                            - [ 'hiking', 'outdoors', 'nature' ]
                            - [ 'coffee', 'cafe', 'drinks' ]
                            - [ 'tech', 'gadgets', 'innovation' ]

            thread:
                name:
                    lower_case: 'thread'

                auth:
                    require_login: true

                instance_page: 'sosh-thread-instance.json'

                fields:
                    user_id:
                        name:
                            lower_case: 'user id'
                        type: foreign_key
                        references:
                            module: 'auth'
                            table: 'user'
                            field: 'id'
                        examples:
                            - "1"
                            - "2"
                            - "3"
                    
                    forum_id:
                        name:
                            lower_case: 'forum id'
                        type: foreign_key
                        default: "-1"
                        references:
                            module: 'sosh_net'
                            table: 'forum'
                            field: 'id'
                        examples:
                            - "1"
                            - "2"
                            - "3"
                    
                    title:
                        name:
                            lower_case: 'title'
                        type: str
                        examples:
                            - 'My favorite PNW hiking trails'
                            - 'Favorite programming languages'
                            - 'Tips for cooking'
                    
                    main_post_id:
                        name:
                            lower_case: 'main post id'
                        description: 'The main post of the thread, always shown at the top'
                        type: foreign_key
                        references:
                            module: 'sosh_net'
                            table: 'post'
                            field: 'id'
                        examples:
                            - "1"
                            - "2"
                            - "3"




            post:
                name:
                    lower_case: 'post'

                auth:
                    require_login: true

                fields:

                    user_id:
                        name:
                            lower_case: 'user id'
                        type: foreign_key
                        references:
                            module: 'auth'
                            table: 'user'
                            field: 'id'
                        examples:
                            - "1"
                            - "2"
                            - "3"

                    forum_id:
                        name:
                            lower_case: 'forum id'
                        description: 'The forum this post belongs to, if -1 then it is not tied to a
                            forum and will show up in chatter'
                        type: foreign_key
                        references:
                            module: 'sosh_net'
                            table: 'forum'
                            field: 'id'
                        default: "-1"
                        examples:
                            - "1"
                            - "2"
                            - "3"

                    reply_to:
                        name:
                            lower_case: 'reply to'
                        description: 'The post this is a reply to, if -1 then it is not a reply'
                        type: foreign_key
                        references:
                            module: 'sosh_net'
                            table: 'post'
                            field: 'id'
                        default: "-1"
                        examples:
                            - "1"
                            - "2"
                            - "-1"

                    message:
                        name:
                            lower_case: 'message'
                        type: str
                        examples:
                            - 'Just had an amazing day at the beach!'
                            - "Loving the new book I'm reading."
                            - "Can't wait for the weekend!"

                    attachments:
                        name:
                            lower_case: 'attachments'
                        type: list
                        default: []
                        element_type: foreign_key
                        references:
                            module: 'file_system'
                            table: 'file'
                            field: 'id'
                        examples:
                            - [ "1", "2" ]
                            - [ "3" ]
                            - []

                    images:
                        name:
                            lower_case: 'images'
                        type: list
                        default: []
                        element_type: foreign_key
                        references:
                            module: 'media'
                            table: 'master_image'
                            field: 'id'
                        examples:
                            - [ "4", "5" ]
                            - [ "6" ]
                            - []

                    related_posts:
                        name:
                            lower_case: 'related posts'
                        type: list
                        default: []
                        element_type: foreign_key
                        references:
                            module: 'sosh_net'
                            table: 'post'
                            field: 'id'
                        examples:
                            - [ "7", "8" ]
                            - [ "9" ]
                            - []

            event:
                name:
                    lower_case: 'event'

                auth:
                    require_login: true

                fields:

                    user_id:
                        name:
                            lower_case: 'user id'
                        type: foreign_key
                        references:
                            module: 'auth'
                            table: 'user'
                            field: 'id'
                        examples:
                            - "1"
                            - "2"
                            - "3"

                    event_name:
                        name:
                            lower_case: 'event name'
                        type: str
                        examples:
                            - 'Birthday Party'
                            - 'Hiking Trip'
                            - 'Book Club Meeting'

                    event_start_time:
                        name:
                            lower_case: 'event start time'
                        type: datetime
                        examples:
                            - '2023-10-15T18:00:00'
                            - '2023-11-20T09:30:00'
                            - '2023-12-05T14:00:00'

                    event_end_time:
                        name:
                            lower_case: 'event end time'
                        type: datetime
                        examples:
                            - '2023-10-15T21:00:00'
                            - '2023-11-20T12:30:00'
                            - '2023-12-05T17:00:00'

                    location:
                        name:
                            lower_case: 'location'
                        type: str
                        examples:
                            - 'Central Park'
                            - 'Downtown Cafe'
                            - 'City Library'

                    description:
                        name:
                            lower_case: 'description'
                        type: str
                        examples:
                            - 'Join us for a fun birthday celebration!'
                            - 'A day of hiking and exploring nature.'
                            - 'Discussing our latest book over coffee.'

            reaction:
                name:
                    lower_case: 'reaction'

                auth:
                    require_login: true
                    max_models_by_field:
                        post_id: 1 # only allow one reaction per user per post

                fields:

                    user_id:
                        name:
                            lower_case: 'user id'
                        type: foreign_key
                        references:
                            module: 'auth'
                            table: 'user'
                            field: 'id'
                        examples:
                            - "1"
                            - "2"
                            - "3"

                    post_id:
                        name:
                            lower_case: 'post id'
                        type: foreign_key
                        references:
                            module: 'sosh_net'
                            table: 'post'
                            field: 'id'
                        examples:
                            - "1"
                            - "2"
                            - "3"

                    reaction_type:
                        name:
                            lower_case: 'reaction type'
                        type: str
                        enum:
                            - '🙂'
                            - '❤️'
                            - '😂'
                            - '👍'
                            - '👎'
                            - '😢'
                            - '😡'
                            - '😬'
                            - '🥱'
                            - '😮'
                            - '🤔'
                        examples:
                            - '🙂'
                            - '❤️'
                            - '😂'
                            - '👍'

        ops:
            get_post_and_reactions:
                name:
                    lower_case: 'get post and reactions'

                description: 'Get a post and its reactions by id'
                func:
                    type: struct
                    value:
                        post:
                            call: 'db.read'
                            args:
                                model_id:
                                    params: { post_id: {} }
                                model_type: 'sosh_net.post'
                        reactions:
                            call: 'db.unique_counts'
                            args:
                                model_type: 'sosh_net.reaction'
                                group_by:
                                    type: str
                                    value: 'reaction_type'
                                filters:
                                    type: struct
                                    value:
                                        post_id:
                                            params: { post_id: {} }

                params:
                    post_id:
                        name:
                            lower_case: 'post id'
                        type: foreign_key
                        references:
                            module: 'sosh_net'
                            table: 'post'
                            field: 'id'
                        examples:
                            - "1"
                            - "2"
                            - "3"

                result:
                    type: struct
                    fields:
                        post:
                            name:
                                lower_case: 'post'
                            type: struct
                        reaction_counts:
                            name:
                                lower_case: 'reaction counts'
                            description: 'Keys are the reaction type and values are the count of each
                                reaction for the post'
                            type: struct

            get_current_user_profile:
                name:
                    lower_case: 'get current user profile'

                description: 'Get the profile of the currently logged in user'
                func:
                    type: struct
                    value:
                        profile:
                            call: 'db.query'
                            args:
                                model_type: 'sosh_net.profile'
                                fields:
                                    type: struct
                                    value:
                                        user_id:
                                            eq:
                                                call: 'key'
                                                args:
                                                    key: 'id'
                                                    object:
                                                        call: 'auth.current_user'
                                                        args: {}

                params: {}

                result:
                    type: struct
                    fields:
                        profile:
                            name:
                                lower_case: 'profile'
                            type: struct

            get_threads_for_forum:
                name:
                    lower_case: 'get threads for forum'

                description: 'Get all threads for a forum by forum id'
                func:
                    type: struct
                    value:
                        forum:
                            branch:
                                - if:
                                      call: 'eq'
                                      args:
                                          a: { params: { forum_id: {} } }
                                          b: "-1"
                                  then:
                                      type: struct
                                      value:
                                          id: "-1"
                                          user_id: "-1"
                                          topic: "Chatter"
                                          description: "A place for off topic threads"
                                          tags: []
                                - else:
                                      call: 'db.read'
                                      args:
                                          model_id:
                                              params: { forum_id: {} }
                                          model_type: 'sosh_net.forum'
                        threads:
                            call: 'db.query'
                            args:
                                model_type: 'sosh_net.thread'
                                offset:
                                    params: { offset: {} }
                                size:
                                    params: { size: {} }
                                where:
                                    type: struct
                                    value:
                                        forum_id:
                                            eq:
                                                params: { forum_id: {} }

                params:
                    forum_id:
                        name:
                            lower_case: 'forum id'
                        type: foreign_key
                        references:
                            module: 'sosh_net'
                            table: 'forum'
                            field: 'id'
                        examples:
                            - "1"
                            - "2"
                            - "3"

                    offset:
                        name:
                            lower_case: 'offset'
                        type: int
                        default: 0
                        examples:
                            - "0"
                            - "10"
                            - "20"

                    size:
                        name:
                            lower_case: 'size'
                        type: int
                        default: 25
                        examples:
                            - "10"
                            - "20"
                            - "50"

                result:
                    type: struct
                    fields:
                        forum:
                            name:
                                lower_case: 'forum'
                            type: struct
                        threads:
                            name:
                                lower_case: 'threads'
                            type: list
                            element_type: struct

                        total:
                            name:
                                lower_case: 'total'
                            type: int

            get_replies_for_post:
                name:
                    lower_case: 'get replies for post'

                description: 'Get all replies for a post by post id'
                func:
                    type: struct
                    value:
                        replies:
                            call: 'db.query'
                            args:
                                model_type: 'sosh_net.post'
                                offset:
                                    params: { offset: {} }
                                size:
                                    params: { size: {} }
                                where:
                                    reply_to:
                                        eq:
                                            params: { post_id: {} }

                params:
                    post_id:
                        name:
                            lower_case: 'post id'
                        type: foreign_key
                        references:
                            module: 'sosh_net'
                            table: 'post'
                            field: 'id'
                        examples:
                            - "1"
                            - "2"
                            - "3"

                    offset:
                        name:
                            lower_case: 'offset'
                        type: int
                        default: 0
                        examples:
                            - "0"
                            - "10"
                            - "20"

                    size:
                        name:
                            lower_case: 'size'
                        type: int
                        default: 25
                        examples:
                            - "10"
                            - "20"
                            - "50"

                result:
                    type: struct
                    fields:
                        replies:
                            name:
                                lower_case: 'replies'
                            type: list
                            element_type: struct

                        total:
                            name:
                                lower_case: 'total'
                            type: int

            create_thread:
                name:
                    lower_case: 'create thread'
                description: 'Create a new thread and main post in a forum'
                func:
                    type: struct
                    value:
                        thread_id:
                            call: 'db.create'
                            args:
                                model_type: 'sosh_net.thread'
                                data:
                                    forum_id:
                                        params: { forum_id: {} }

                                    title:
                                        params: { title: {} }

                                    user_id: '-1'
                                    
                                    main_post_id:
                                        call: 'db.create'
                                        args:
                                            model_type: 'sosh_net.post'
                                            data:
                                                forum_id:
                                                    params: { forum_id: {} }
                                                reply_to: '-1'
                                                message:
                                                    params: { message: {} }
                                                attachments:
                                                    params: { attachments: {} }
                                                images:
                                                    params: { images: {} }
                                                user_id: '-1'

                params:
                    forum_id:
                        name:
                            lower_case: 'forum id'
                        type: foreign_key
                        references:
                            module: 'sosh_net'
                            table: 'forum'
                            field: 'id'
                        examples:
                            - "1"
                            - "2"
                            - "3"

                    title:
                        name:
                            lower_case: 'title'
                        type: str
                        examples:
                            - "General Discussion"
                            - "Announcements"
                            - "Feedback"

                    message:
                        name:
                            lower_case: 'message'
                        type: str
                        examples:
                            - "Welcome to the general discussion forum!"
                            - "Here are the latest announcements."
                            - "We value your feedback and suggestions."
                    
                    attachments:
                        name:
                            lower_case: 'attachments'
                        type: list
                        element_type: foreign_key
                        references:
                            module: 'file_system'
                            table: 'file'
                            field: 'id'
                        examples:
                            - [ "20", "21" ]
                            - [ "22" ]
                            - []

                    images:
                        name:
                            lower_case: 'images'
                        type: list
                        element_type: foreign_key
                        references:
                            module: 'media'
                            table: 'master_image'
                            field: 'id'
                        examples:
                            - [ "10", "11" ]
                            - [ "12" ]
                            - []
                
                result:
                    type: struct
                    fields:
                        thread_id:
                            type: foreign_key
                            references:
                                module: 'sosh_net'
                                table: 'thread'
                                field: 'id'
            
            get_thread_and_post:
                name:
                    lower_case: 'get thread and post'
                description: 'Get a thread and its main post by thread id'
                func:
                    type: struct
                    self:
                        thread:
                            call: 'db.read'
                            args:
                                model_id:
                                    params: { thread_id: {} }
                                model_type: 'sosh_net.thread'
                    value:
                        thread: {self: thread}
                        main_post:
                            call: 'db.read'
                            args:
                                model_id:
                                    call: 'key'
                                    args:
                                        key: 'main_post_id'
                                        object:
                                            self: thread
                                model_type: 'sosh_net.post'

                params:
                    thread_id:
                        name:
                            lower_case: 'thread id'
                        type: foreign_key
                        references:
                            module: 'sosh_net'
                            table: 'thread'
                            field: 'id'
                        examples:
                            - "1"
                            - "2"
                            - "3"

                result:
                    type: struct
                    fields:
                        thread:
                            name:
                                lower_case: 'thread'
                            type: struct
                        main_post:
                            name:
                                lower_case: 'main post'
                            type: struct