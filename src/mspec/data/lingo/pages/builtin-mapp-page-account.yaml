lingo:
    version: page-beta-1
    title: "sosh net :: account"

params: {}

state: 
  is_logged_in:
    type: bool
    calc: 
      call: key
      args:
        object: 
          call: auth.is_logged_in
          args: {}
        key: logged_in
  
  user_data:
    type: struct
    default:
      state: 'pending'
      error: ''
      data: {}
  

ops: {}

output:
- heading: 'shosh net'
  level: 1

- heading: ":: account"
  level: 2

- breadcrumbs:
  - "home"
  - "sosh-net"
  - "account"

- break: 1

- block:
    - text: 'are you logged in: '
      style:
        bold: true
    - branch:
      - if:
          state: {is_logged_in: {}}
        then:
          text: 'yes'
      - else:
          - text: 'no'
    - break: 1
    - branch:
      - if:
          state: {is_logged_in: {}}
        then:
          block:
            - text: 'here you can adjust your stuffs'
            - break: 1
            - text: 'Yessir!'
              style:
                italic: true
      - else:
          block:
            - text: 'please log in to see your account details and settings'