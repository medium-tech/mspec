lingo:
    version: page-beta-1
    parent_url: '/api/spec'
    title: "sosh net :: account"

params: {}

state:
    is_logged_in:
        type: bool
        calc:
            call: key
            args:
                object:
                    call: auth.is_logged_in
                    args: {}
                key: logged_in

    fetch_user:
        type: struct
        default:
            state: initial
            error: ''
            data: {}
            result:
                type: any
                value: null

    login_user:
        type: struct
        default:
            state: initial
            error: ''
            data: {}
            result:
                type: any
                value: null

    create_user:
        type: struct
        default:
            state: initial
            error: ''
            data: {}
            result:
                type: any
                value: null

    logout_state:
        type: struct
        default:
            state: initial
            error: ''
            data: {}
            result:
                type: any
                value: null

    email_not_verified:
        type: bool
        calc:
            branch:
                - if:
                    call: eq
                    args:
                        a:
                            call: key
                            args:
                                object: {state: {fetch_user: {}}}
                                key: state
                        b: 'result'
                  then:
                    call: eq
                    args:
                        a:
                            call: key
                            args:
                                object: {state: {fetch_user: {}}}
                                key: result.value.email_verified
                        b: false
                - else:
                    type: bool
                    value: false    

output:
    - heading: 'shosh net'
      level: 1

    - breadcrumbs:
          - "mtech"
          - "sosh-net"
          - "account"

    - heading: ":: account"
      level: 2
    
    - branch:
        - if:
                state: { is_logged_in: {} }
          then:
            - op:
                bind:
                    state: { logout_state: {} }
                params:
                    mode: 'current'
                display:
                    friendly_status: true
                interactive: true
                http: '/api/auth/logout-user'
                submit_button_text: logout
                instruction: ''
                definition: 'auth.logout_user'
            - op:
                    bind:
                        state: { fetch_user: {} }
                    interactive: true
                    display:
                        friendly_status: true
                        show_status_display: true
                    http: '/api/auth/current-user'
                    definition: 'auth.current_user'
                    submit_button_text: reload user data
                    instruction: ''
                    auto_submit: true
            - branch:
                - if: 
                    state: { email_not_verified: {} }
                  then:
                    - heading: ':: verify email address'
                      level: 4
                    - text: 'To verify your email address: '
                      style:
                          bold: true
                    - type: list
                      value:
                        - text: 'get a verificaiton code'
                          link: '/com/start-email-verification'
                        
                        - text: 'verify a code you received'
                          link: '/com/verify-email-address'
                - else:
                    text: ''
            - heading: ':: your profile'
              level: 4
            - link: '/sosh-net/profile/yours'
              text: 'create or edit'
        - else:

            - heading: ':: login'
              level: 4
            - op:
                    bind:
                        state: { login_user: {} }
                    display:
                        friendly_status: true
                    interactive: true
                    http: '/api/auth/login-user'
                    definition: 'auth.login_user'
                    submit_button_text: login
                    instruction: 'login to access all features of sosh net'

            - heading: ':: create account'
              level: 4
            - op:
                    bind:
                        state: { create_user: {} }
                    display:
                        friendly_status: true
                    interactive: true
                    http: '/api/auth/create-user'
                    definition: 'auth.create_user'
                    instruction: 'create a new account to access all features of sosh net'
                    submit_button_text: create account
