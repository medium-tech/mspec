lingo:
    version: page-beta-1
    title: "sosh net :: account"

params: {}

state: 
  is_logged_in:
    type: bool
    calc: 
      call: key
      args:
        object: 
          call: auth.is_logged_in
          args: {}
        key: logged_in
  
  fetch_user:
    type: struct
    default:
      state: initial
      error: ''
      data: {}
      result:
        type: any
        value: null
  
  user_op_definition:
    type: op
    default:
      name:
          lower_case: "current user"
      description: "Get the current logged in user"
      func:
          call: "auth.current_user"
          args: {}
      params: {}
      result:
          type: struct
          fields:
              id:
                  name:
                      lower_case: "id"
                  type: str
                  description: "ID of the current user"
              name:
                  name:
                      lower_case: "name"
                  type: str
                  description: "Name of the current user"
              email:
                  name:
                      lower_case: "email"
                  type: str
                  description: "Email of the current user"
              number_of_sessions:
                  name:
                      lower_case: "number of sessions"
                  type: int
                  description: "Number of active sessions for the current user"

  logout_state:
    type: struct
    default:
      state: initial
      error: ''
      result:
        type: any
        value: null

ops: {}

output:
- heading: 'shosh net'
  level: 1

- heading: ":: account"
  level: 2

- breadcrumbs:
  - "home"
  - "sosh-net"
  - "account"

- break: 1

- type: list
  display:
    format: table
    columns:
      - column1
      - column2
      - column3
  value:
    - type: struct
      value: 
        column1: 
          text: 'are you logged in?'
          style:
            bold: true
        column2: 
          branch:
            - if:
                state: {is_logged_in: {}}
              then:
                text: 'yes'
                style:
                  bold: true
                  color: 'green'
            - else:
                text: ''
        column3:
          branch:
            - if:
                state: {is_logged_in: {}}
              then:
                text: ''
            - else:
                text: 'no'
                style:
                  bold: true
                  color: 'red'
    - type: struct
      value: 
        column1: 
          text: 'do you want to be?'
          style:
            bold: true
        column2:
          branch:
            - if:
                state: {is_logged_in: {}}
              then:
                text: 'no'
            - else:
                text: 'signup'
                link: '/auth/create-user'
        column3: 
          branch:
            - if:
                state: {is_logged_in: {}}
              then:
                button:
                  call: 'op.http'
                  args:
                    url: '/api/auth/logout-user'
                    data: {}
                    bind: 
                      state: {logout_state: {}}
                text: 'log out'
            - else:
                text: 'login'
                link: '/auth/login-user'

- break: 1

- branch:
  - if:
      state: {is_logged_in: {}}
    then:
      - heading: ':: account details'
        level: 4
      - op: 
          bind:
            state: {fetch_user: {}}
          interactive: true
          http: '/api/auth/current-user'
          definition:
            state: {user_op_definition: {}}
          submit_button_text: refresh
          instruction: ''
          auto_submit: true

  - else:
      text: '::'