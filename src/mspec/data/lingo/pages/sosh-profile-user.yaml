lingo:
    version: page-beta-1
    title: "sosh net :: your profile"

params: 
    project_name:
        name:
            lower_case: 'project name'
        type: str
        default: 'My Lingo Project'

    module_name:
        name:
            lower_case: 'module name'
        type: str
        default: 'My Lingo Module'
    
    model_definition:
        name:
            lower_case: 'model definition'
        type: model
        value:
            name:
                lower_case: 'my model a'
            fields:
                user_id:
                    name:
                        lower_case: 'user id'
                    type: str
                    description: 'the id of the user'

    model_id:
        name:
            lower_case: 'model id'
        type: str
        default: '-1'
        description: 'the id of the model to display'
    
    model_name:
        name:
            lower_case: 'model name'
        type: str
        default: 'my model a'
        description: 'the name of the model to display'

state:
    is_logged_in:
        type: bool
        calc:
            call: key
            args:
                object:
                    call: auth.is_logged_in
                    args: {}
                key: logged_in

ops: {}

output:
    - heading: "sosh.net"
      level: 1

    - heading: ":: your profile"
      level: 2

    - breadcrumbs:
          - "home"
          - "sosh-net"
          - "your profile"

    - break: 1

    - block:
          - text: 'are you logged in: '
          - lingo: { state: { is_logged_in: {} } }
